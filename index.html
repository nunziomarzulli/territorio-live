<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territorio Live</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  
<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  height:100vh;
}

.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

.active{
  display:flex;
}

#startScreen{
  background:
    linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.45)),
    radial-gradient(circle at center, #1b5e20 0%, #061308 35%, #020402 100%);
  color:white;
  flex-direction:column;
}

.logo{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:34px;
    font-weight:800;
    letter-spacing:1px;
}
 .logo-img{
    width:220px;
    height:auto;
    margin-bottom:22px;
}

.logo span{
  color:#63c74d;
}

.subtitle{
  margin-top:8px;
  font-size:17px;
  opacity:.9;
}

#cameraBtn{
  margin-top:60px;
  width:230px;
  height:230px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.9);
  background:#2e7d32;
  color:white;
  box-shadow:0 0 35px rgba(99,199,77,.8);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  font-weight:700;
  cursor:pointer;
}

#openMapBtn{
  margin-top:40px;
  width:85%;
  max-width:360px;
  background:white;
  color:#2e7d32;
  font-weight:bold;
}

input{
  display:none;
}

#previewImg{
  max-width:100%;
  max-height:65vh;
  border-radius:16px;
}

button{
  border:none;
  padding:14px 22px;
  border-radius:12px;
  font-size:18px;
}

.buttons{
  margin-top:25px;
  display:flex;
  gap:15px;
  justify-content:center;
}

.secondary{
  background:#ddd;
  color:#222;
}

.primary{
  background:#2e7d32;
  color:white;
}

#mapScreen{
  padding:0;
  flex-direction:column;
}

#map{
  width:100%;
  height:62vh;
}

#mapPanel{
  width:100%;
  background:white;
  padding:14px;
  box-sizing:border-box;
}

#confirmPositionBtn,
#cancelMapBtn{
  width:90%;
  margin-top:10px;
}

#categoryScreen{
  align-items:flex-start;
  overflow-y:auto;
  background:#f5f5f5;
}

#categoryBox{
  width:100%;
  max-width:420px;
  margin:auto;
}

#aiBox{
  background:white;
  border-radius:14px;
  padding:14px;
  margin-bottom:18px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.categoryBtn{
  width:100%;
  margin:7px 0;
  background:white;
  border:1px solid #ddd;
  color:#222;
  text-align:left;
}

.categoryBtn.selected{
  background:#2e7d32;
  color:white;
}

#sendBtn,
#backToMapBtn{
  width:100%;
  margin-top:12px;
}

#loadingText{
  font-size:22px;
}

#exploreScreen{
  padding:0;
  flex-direction:column;
}

#exploreTopBar{
  width:100%;
  height:58px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  box-sizing:border-box;
  border-bottom:1px solid #ddd;
  z-index:999;
}

#exploreMap{
  width:100%;
  height:calc(100vh - 58px);
}
</style>
</head>

<body>

<section id="startScreen" class="screen active">
 <div class="logo">
    <img src="logo-tl.png.png" alt="Territorio Live Logo" class="logo-img">
    <div>TERRITORIO <span>LIVE</span></div>
</div>
  <div class="subtitle">Il territorio parla attraverso i cittadini</div>

  <input type="file" accept="image/*" capture="environment" id="camera">

  <button id="cameraBtn">SCATTA</button>

  <button id="openMapBtn">
    📍 APRI LA MAPPA
  </button>
</section>

<section id="previewScreen" class="screen">
  <div>
    <img id="previewImg" alt="Anteprima foto">
    <div class="buttons">
      <button class="secondary" id="retakeBtn">Rifai</button>
      <button class="primary" id="continueBtn">Continua</button>
    </div>
  </div>
</section>

<section id="loadingScreen" class="screen">
  <p id="loadingText">📍 Rilevamento posizione...</p>
</section>

<section id="mapScreen" class="screen">
  <div id="map"></div>

  <div id="mapPanel">
    <h2>Conferma posizione</h2>
    <p>Controlla che il punto sia corretto. Se necessario trascinalo.</p>

    <button class="primary" id="confirmPositionBtn">Conferma posizione</button>
    <button class="secondary" id="cancelMapBtn">Annulla e rifai foto</button>
  </div>
</section>

<section id="categoryScreen" class="screen">
  <div id="categoryBox">
    <div id="aiBox">
      <strong>Analisi foto</strong>
      <p id="aiSuggestion">Categoria suggerita: in attesa...</p>
    </div>

    <h2>Conferma categoria</h2>

    <button class="categoryBtn" data-category="Discarica a cielo aperto">🏚️ Discarica a cielo aperto</button>
    <button class="categoryBtn" data-category="Materiali pericolosi">☣️ Materiali pericolosi</button>
    <button class="categoryBtn" data-category="Veicolo abbandonato">🚗 Veicolo abbandonato</button>
    <button class="categoryBtn" data-category="Albero o ramo pericolante">🌳 Albero / ramo pericolante</button>
    <button class="categoryBtn" data-category="Sversamento sospetto">💧 Sversamento sospetto</button>
    <button class="categoryBtn" data-category="Incendio">🔥 Incendio</button>

    <button class="primary" id="sendBtn">Invia segnalazione</button>
    <button class="secondary" id="backToMapBtn">Torna alla mappa</button>
  </div>
</section>

<section id="exploreScreen" class="screen">
  <div id="exploreTopBar">
    <button class="secondary" id="backHomeBtn">← Home</button>
    <strong>Mappa segnalazioni</strong>
    <button class="primary" id="newReportBtn">+</button>
  </div>

  <div id="exploreMap"></div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const camera = document.getElementById("camera");
const cameraBtn = document.getElementById("cameraBtn");
const openMapBtn = document.getElementById("openMapBtn");

const startScreen = document.getElementById("startScreen");
const previewScreen = document.getElementById("previewScreen");
const loadingScreen = document.getElementById("loadingScreen");
const mapScreen = document.getElementById("mapScreen");
const categoryScreen = document.getElementById("categoryScreen");
const exploreScreen = document.getElementById("exploreScreen");

const previewImg = document.getElementById("previewImg");
const retakeBtn = document.getElementById("retakeBtn");
const continueBtn = document.getElementById("continueBtn");
const confirmPositionBtn = document.getElementById("confirmPositionBtn");
const cancelMapBtn = document.getElementById("cancelMapBtn");
const sendBtn = document.getElementById("sendBtn");
const backToMapBtn = document.getElementById("backToMapBtn");
const backHomeBtn = document.getElementById("backHomeBtn");
const newReportBtn = document.getElementById("newReportBtn");

const categoryButtons = document.querySelectorAll(".categoryBtn");
const aiSuggestion = document.getElementById("aiSuggestion");

let selectedPhoto = null;
let selectedCategory = null;
let map = null;
let marker = null;
let exploreMap = null;
let currentLat = null;
let currentLng = null;

function showScreen(screen){
  startScreen.classList.remove("active");
  previewScreen.classList.remove("active");
  loadingScreen.classList.remove("active");
  mapScreen.classList.remove("active");
  categoryScreen.classList.remove("active");
  exploreScreen.classList.remove("active");
  screen.classList.add("active");
}

cameraBtn.onclick = () => {
  camera.click();
};

camera.onchange = () => {
  const file = camera.files[0];
  if (!file) return;

  selectedPhoto = file;
  previewImg.src = URL.createObjectURL(file);
  showScreen(previewScreen);
};

retakeBtn.onclick = () => {
  camera.value = "";
  selectedPhoto = null;
  selectedCategory = null;
  showScreen(startScreen);
};

continueBtn.onclick = () => {
  showScreen(loadingScreen);

  if (!navigator.geolocation) {
    alert("GPS non disponibile su questo dispositivo.");
    showScreen(previewScreen);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    position => {
      currentLat = position.coords.latitude;
      currentLng = position.coords.longitude;

      showScreen(mapScreen);

      setTimeout(() => {
        initMap(currentLat, currentLng);
      }, 200);
    },
    error => {
      alert("Non riesco a rilevare la posizione. Controlla i permessi GPS.");
      showScreen(previewScreen);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
};

function initMap(lat, lng){
  if (!map) {
    map = L.map("map").setView([lat, lng], 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    marker = L.marker([lat, lng], { draggable:true }).addTo(map);

    marker.on("dragend", function(){
      const pos = marker.getLatLng();
      currentLat = pos.lat;
      currentLng = pos.lng;
    });
  } else {
    map.setView([lat, lng], 18);
    marker.setLatLng([lat, lng]);
  }

  setTimeout(() => map.invalidateSize(), 300);
}

confirmPositionBtn.onclick = () => {
  simulateAI();
  showScreen(categoryScreen);
};

function simulateAI(){
  const suggested = "Discarica a cielo aperto";
  selectedCategory = suggested;

  aiSuggestion.textContent = "Categoria suggerita: " + suggested;

  categoryButtons.forEach(btn => {
    btn.classList.remove("selected");
    if (btn.dataset.category === suggested) {
      btn.classList.add("selected");
    }
  });
}

cancelMapBtn.onclick = () => {
  camera.value = "";
  selectedPhoto = null;
  selectedCategory = null;
  showScreen(startScreen);
};

categoryButtons.forEach(button => {
  button.onclick = () => {
    categoryButtons.forEach(btn => btn.classList.remove("selected"));
    button.classList.add("selected");
    selectedCategory = button.dataset.category;
    aiSuggestion.textContent = "Categoria selezionata: " + selectedCategory;
  };
});

backToMapBtn.onclick = () => {
  showScreen(mapScreen);
  setTimeout(() => {
    if (map) map.invalidateSize();
  }, 200);
};

sendBtn.onclick = () => {
  if (!selectedCategory) {
    alert("Scegli una categoria.");
    return;
  }

  alert(
    "Segnalazione pronta:\n\n" +
    "Categoria: " + selectedCategory + "\n" +
    "Lat: " + currentLat + "\n" +
    "Lng: " + currentLng + "\n\n" +
    "Nel prossimo passo salveremo tutto su Firebase."
  );
};

openMapBtn.onclick = () => {
  showScreen(exploreScreen);

  setTimeout(() => {
    initExploreMap();
  }, 200);
};

function initExploreMap(){
  if (!exploreMap) {
    exploreMap = L.map("exploreMap").setView([41.1171, 16.8719], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(exploreMap);
  }

  exploreMap.invalidateSize();
}

backHomeBtn.onclick = () => {
  showScreen(startScreen);
};

newReportBtn.onclick = () => {
  showScreen(startScreen);
};
</script>

</body>
</html>
