<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Territorio Live</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#container{
    text-align:center;
}

#cameraBtn{
    width:220px;
    height:220px;
    border-radius:50%;
    border:none;
    background:#2e7d32;
    color:white;
    font-size:28px;
    cursor:pointer;
}

#cameraBtn:active{
    transform:scale(.97);
}

p{
    margin-top:25px;
    font-size:20px;
}

input{
    display:none;
}

</style>

</head>

<body>

<div id="container">

<input
type="file"
accept="image/*"
capture="environment"
id="camera">

<button id="cameraBtn">
📷<br><br>
SCATTA
</button>

<p id="stato">
Tocca il pulsante per iniziare
</p>

</div>

<script>

const camera=document.getElementById("camera");
const button=document.getElementById("cameraBtn");
const stato=document.getElementById("stato");

button.onclick=()=>{

camera.click();

};

camera.onchange=()=>{

stato.innerHTML="✅ Foto acquisita";

};

</script>

</body>

</html>
