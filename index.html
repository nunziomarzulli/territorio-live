<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territorio Live</title>
    <link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="LOGO TL app.png">
<meta name="theme-color" content="#2e7d32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Territorio Live">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;height:100vh}
.screen{display:none;height:100vh;justify-content:center;align-items:center;text-align:center;padding:20px;box-sizing:border-box}
.active{display:flex}
#startScreen{background:linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.45)),radial-gradient(circle at center,#1b5e20 0%,#061308 35%,#020402 100%);color:white;flex-direction:column}
.logo{display:flex;flex-direction:column;align-items:center;font-size:34px;font-weight:800;letter-spacing:1px}
.logo-img{width:220px;height:auto;margin-bottom:22px}
.logo span{color:#63c74d}
.subtitle{margin-top:8px;font-size:17px;opacity:.9}
#cameraBtn{margin-top:60px;width:230px;height:230px;border-radius:50%;border:3px solid rgba(255,255,255,.9);background:#2e7d32;color:white;box-shadow:0 0 35px rgba(99,199,77,.8);display:flex;justify-content:center;align-items:center;font-size:42px;font-weight:700;cursor:pointer}
#openMapBtn{margin-top:40px;width:85%;max-width:360px;background:white;color:#2e7d32;font-weight:bold}
input{display:none}
#previewImg{max-width:100%;max-height:65vh;border-radius:16px}
button{border:none;padding:14px 22px;border-radius:12px;font-size:18px;cursor:pointer}
.buttons{margin-top:25px;display:flex;gap:15px;justify-content:center}
.secondary{background:#ddd;color:#222}
.primary{background:#2e7d32;color:white}
.danger{background:#c62828;color:white;margin-top:8px;width:100%;font-size:15px;padding:10px}
.resolve{background:#f9a825;color:#111;margin-top:8px;width:100%;font-size:15px;padding:10px;font-weight:bold}
#mapScreen{padding:0;flex-direction:column}
#map{width:100%;height:62vh}
#mapPanel{width:100%;background:white;padding:14px;box-sizing:border-box}
#confirmPositionBtn,#cancelMapBtn{width:90%;margin-top:10px}
#categoryScreen{align-items:flex-start;overflow-y:auto;background:#f5f5f5}
#categoryBox{width:100%;max-width:420px;margin:auto}
#aiBox{background:white;border-radius:14px;padding:14px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.categoryBtn{width:100%;margin:7px 0;background:white;border:1px solid #ddd;color:#222;text-align:left}
.categoryBtn.selected{background:#2e7d32;color:white}
#sendBtn,#backToMapBtn{width:100%;margin-top:12px}
#loadingText{font-size:22px}
#exploreScreen{padding:0;flex-direction:column}
#exploreTopBar{width:100%;height:74px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 10px;box-sizing:border-box;border-bottom:1px solid #ddd;z-index:999;gap:8px}
#exploreTitleBox{display:flex;flex-direction:column;align-items:center;font-size:13px;line-height:1.35}
#statsBox{
    position:absolute;
    bottom:20px;
    left:15px;
    background:rgba(255,255,255,.95);
    border-radius:12px;
    padding:10px 14px;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
    z-index:1000;
    font-size:15px;
    font-weight:bold;
    line-height:1.6;
}
#exploreMap{width:100%;height:calc(100vh - 74px)}
.popup-img{width:180px;max-height:140px;object-fit:cover;border-radius:10px;margin-top:8px}
.popup-box{text-align:left;font-size:14px}
.resolved-label{display:inline-block;background:#f9a825;color:#111;padding:4px 7px;border-radius:8px;font-weight:bold;margin-top:4px}
.open-label{display:inline-block;background:#c62828;color:white;padding:4px 7px;border-radius:8px;font-weight:bold;margin-top:4px}
</style>
</head>

<body>

<section id="startScreen" class="screen active">
  <div class="logo">
    <img src="logo-tl.png.png" alt="Territorio Live Logo" class="logo-img">
    <div>TERRITORIO <span>LIVE</span></div>
  </div>

  <div class="subtitle">Il territorio parla attraverso i cittadini</div>

  <input type="file" accept="image/*" capture="environment" id="camera">
  <input type="file" accept="image/*" capture="environment" id="resolveCamera">

  <button id="cameraBtn">SCATTA</button>
  <button id="openMapBtn">📍 APRI LA MAPPA</button>
</section>

<section id="previewScreen" class="screen">
  <div>
    <img id="previewImg" alt="Anteprima foto">
    <div class="buttons">
      <button class="secondary" id="retakeBtn">Rifai</button>
      <button class="primary" id="continueBtn">Continua</button>
    </div>
  </div>
</section>

<section id="loadingScreen" class="screen">
  <p id="loadingText">📍 Rilevamento posizione...</p>
</section>

<section id="mapScreen" class="screen">
  <div id="map"></div>

  <div id="mapPanel">
    <h2>Conferma posizione</h2>
    <p>Controlla che il punto sia corretto. Se necessario trascinalo.</p>

    <button class="primary" id="confirmPositionBtn">Conferma posizione</button>
    <button class="secondary" id="cancelMapBtn">Annulla e rifai foto</button>
  </div>
</section>

<section id="categoryScreen" class="screen">
  <div id="categoryBox">
    <div id="aiBox">
      <strong>Analisi foto</strong>
      <p id="aiSuggestion">Categoria suggerita: in attesa...</p>
    </div>

    <h2>Conferma categoria</h2>

    <button class="categoryBtn" data-category="Discarica a cielo aperto">🏚️ Discarica a cielo aperto</button>
    <button class="categoryBtn" data-category="Materiali pericolosi">☣️ Materiali pericolosi</button>
    <button class="categoryBtn" data-category="Veicolo abbandonato">🚗 Veicolo abbandonato</button>
    <button class="categoryBtn" data-category="Albero o ramo pericolante">🌳 Albero / ramo pericolante</button>
    <button class="categoryBtn" data-category="Sversamento sospetto">💧 Sversamento sospetto</button>
    <button class="categoryBtn" data-category="Incendio">🔥 Incendio</button>

    <button class="primary" id="sendBtn">Invia segnalazione</button>
    <button class="secondary" id="backToMapBtn">Torna alla mappa</button>
  </div>
</section>

<section id="exploreScreen" class="screen">
  <div id="exploreTopBar">
    <button class="secondary" id="backHomeBtn">← Home</button>

 <div id="exploreTitleBox">
    <strong>Mappa segnalazioni</strong>
</div>
  
    <button class="primary" id="newReportBtn">+</button>
  </div>

  <div id="exploreMap"></div>
  <div id="statsBox">
    🔴 Attive: 0<br>
    ⭐ Risolte: 0
</div>

</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  serverTimestamp,
  deleteDoc,
  doc,
  updateDoc,
  increment,
  arrayUnion
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhAJOjQSXmzvo2QnuhB4EIDTK88DCHgm0",
  authDomain: "territorio-live.firebaseapp.com",
  projectId: "territorio-live",
  storageBucket: "territorio-live.firebasestorage.app",
  messagingSenderId: "1014933311241",
  appId: "1:1014933311241:web:21cd7b52882677ede58dd8",
  measurementId: "G-96WJ75QWLW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const camera = document.getElementById("camera");
const resolveCamera = document.getElementById("resolveCamera");
const cameraBtn = document.getElementById("cameraBtn");
const openMapBtn = document.getElementById("openMapBtn");

const startScreen = document.getElementById("startScreen");
const previewScreen = document.getElementById("previewScreen");
const loadingScreen = document.getElementById("loadingScreen");
const mapScreen = document.getElementById("mapScreen");
const categoryScreen = document.getElementById("categoryScreen");
const exploreScreen = document.getElementById("exploreScreen");

const previewImg = document.getElementById("previewImg");
const retakeBtn = document.getElementById("retakeBtn");
const continueBtn = document.getElementById("continueBtn");
const confirmPositionBtn = document.getElementById("confirmPositionBtn");
const cancelMapBtn = document.getElementById("cancelMapBtn");
const sendBtn = document.getElementById("sendBtn");
const backToMapBtn = document.getElementById("backToMapBtn");
const backHomeBtn = document.getElementById("backHomeBtn");
const newReportBtn = document.getElementById("newReportBtn");
const statsBox = document.getElementById("statsBox");

const categoryButtons = document.querySelectorAll(".categoryBtn");
const aiSuggestion = document.getElementById("aiSuggestion");

let selectedPhoto = null;
let compressedPhoto = null;
let selectedCategory = null;
let map = null;
let marker = null;
let exploreMap = null;
let exploreMarkers = [];
let userPositionMarker = null;
let userPositionCircle = null;
let userWatchId = null;  
let currentLat = null;
let currentLng = null;
let reportToResolveId = null;
let reportsCache = {};
const MAX_RESOLVE_DISTANCE_METERS = 30;
  
let ownerId = localStorage.getItem("territorioLiveOwnerId");

if (!ownerId) {
  ownerId = crypto.randomUUID();
  localStorage.setItem("territorioLiveOwnerId", ownerId);
}

function showScreen(screen){
  startScreen.classList.remove("active");
  previewScreen.classList.remove("active");
  loadingScreen.classList.remove("active");
  mapScreen.classList.remove("active");
  categoryScreen.classList.remove("active");
  exploreScreen.classList.remove("active");
  screen.classList.add("active");
}

cameraBtn.onclick = () => {
  camera.click();
};

camera.onchange = async () => {
  const file = camera.files[0];
  if (!file) return;

  selectedPhoto = file;
  compressedPhoto = await compressImage(file);

  previewImg.src = compressedPhoto;
  showScreen(previewScreen);
};

resolveCamera.onchange = async () => {
  const file = resolveCamera.files[0];
  if (!file || !reportToResolveId) return;

  const conferma = confirm("Confermi che questa segnalazione è stata risolta?");
  if (!conferma) {
    reportToResolveId = null;
    resolveCamera.value = "";
    return;
  }

  try {
    const resolvedImageBase64 = await compressImage(file);

    await updateDoc(doc(db, "segnalazioni", reportToResolveId), {
      stato: "risolta",
      resolvedAt: serverTimestamp(),
      resolvedImageBase64: resolvedImageBase64,
      resolvedBy: ownerId
    });

    alert("Segnalazione marcata come risolta.");
    reportToResolveId = null;
    resolveCamera.value = "";
    await loadReportsFromFirestore();

  } catch (error) {
    console.error("Errore risoluzione:", error);
    alert("Errore durante il salvataggio della risoluzione.");
  }
};

retakeBtn.onclick = () => {
  resetReport();
  showScreen(startScreen);
};

continueBtn.onclick = () => {
  showScreen(loadingScreen);

  if (!navigator.geolocation) {
    alert("GPS non disponibile su questo dispositivo.");
    showScreen(previewScreen);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    position => {
      currentLat = position.coords.latitude;
      currentLng = position.coords.longitude;

      showScreen(mapScreen);

      setTimeout(() => {
        initMap(currentLat, currentLng);
      }, 200);
    },
    () => {
      alert("Non riesco a rilevare la posizione. Controlla i permessi GPS.");
      showScreen(previewScreen);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
};

function initMap(lat, lng){
  if (!map) {
    map = L.map("map").setView([lat, lng], 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    marker = L.marker([lat, lng], { draggable:true }).addTo(map);

    marker.on("dragend", function(){
      const pos = marker.getLatLng();
      currentLat = pos.lat;
      currentLng = pos.lng;
    });

  } else {
    map.setView([lat, lng], 18);
    marker.setLatLng([lat, lng]);
  }

  setTimeout(() => map.invalidateSize(), 300);
}

confirmPositionBtn.onclick = () => {
  simulateAI();
  showScreen(categoryScreen);
};

function simulateAI(){
  const suggested = "Discarica a cielo aperto";
  selectedCategory = suggested;

  aiSuggestion.textContent = "Categoria suggerita: " + suggested;

  categoryButtons.forEach(btn => {
    btn.classList.remove("selected");
    if (btn.dataset.category === suggested) {
      btn.classList.add("selected");
    }
  });
}

cancelMapBtn.onclick = () => {
  resetReport();
  showScreen(startScreen);
};

categoryButtons.forEach(button => {
  button.onclick = () => {
    categoryButtons.forEach(btn => btn.classList.remove("selected"));
    button.classList.add("selected");
    selectedCategory = button.dataset.category;
    aiSuggestion.textContent = "Categoria selezionata: " + selectedCategory;
  };
});

backToMapBtn.onclick = () => {
  showScreen(mapScreen);
  setTimeout(() => {
    if (map) map.invalidateSize();
  }, 200);
};

sendBtn.onclick = async () => {
  if (!selectedCategory) {
    alert("Scegli una categoria.");
    return;
  }

  if (!compressedPhoto) {
    alert("Manca la foto.");
    return;
  }

  if (!currentLat || !currentLng) {
    alert("Manca la posizione GPS.");
    return;
  }

  sendBtn.disabled = true;
  sendBtn.textContent = "Invio in corso...";

  try {
    await addDoc(collection(db, "segnalazioni"), {
      categoria: selectedCategory,
      lat: currentLat,
      lng: currentLng,
      immagineBase64: compressedPhoto,
      stato: "aperta",
      conferme: 0,
      confirmedBy: [],
      ownerId: ownerId,
      createdAt: serverTimestamp()
    });

    alert("Segnalazione inviata correttamente.");
    resetReport();
    showScreen(startScreen);

  } catch (error) {
    console.error("Errore Firestore:", error);
    alert("Errore durante il salvataggio.");
  }

  sendBtn.disabled = false;
  sendBtn.textContent = "Invia segnalazione";
};

openMapBtn.onclick = () => {
  showScreen(exploreScreen);

  setTimeout(async () => {
    initExploreMap();
    await loadReportsFromFirestore();
  }, 200);
};

function initExploreMap(){
  if (!exploreMap) {
    exploreMap = L.map("exploreMap").setView([41.1171, 16.8719], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(exploreMap);
  }

  exploreMap.invalidateSize();
  
  startUserPositionTracking();
}
function createUserPositionIcon(){
    return L.divIcon({
        html: '<div style="width:18px;height:18px;background:#1e88e5;border:3px solid white;border-radius:50%;box-shadow:0 0 8px rgba(0,0,0,.5)"></div>',
        className: "",
        iconSize: [24, 24],
        iconAnchor: [12, 12]
    });
}

function startUserPositionTracking(){

    if(!exploreMap) return;

    if(!navigator.geolocation){
        alert("GPS non disponibile su questo dispositivo.");
        return;
    }

    if(userWatchId !== null){
        navigator.geolocation.clearWatch(userWatchId);
        userWatchId = null;
    }

    userWatchId = navigator.geolocation.watchPosition(

        function(position){

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy || 0;

            if(!userPositionMarker){
                userPositionMarker = L.marker([lat, lng], {
                    icon: createUserPositionIcon(),
                    zIndexOffset: 1000
                }).addTo(exploreMap);

                userPositionCircle = L.circle([lat, lng], {
                    radius: accuracy,
                    weight: 1,
                    fillOpacity: 0.12
                }).addTo(exploreMap);

                exploreMap.setView([lat, lng], 16);

            } else {
                userPositionMarker.setLatLng([lat, lng]);

                if(userPositionCircle){
                    userPositionCircle.setLatLng([lat, lng]);
                    userPositionCircle.setRadius(accuracy);
                }
            }

        },

        function(){
            console.log("GPS non autorizzato o non disponibile.");
        },

        {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 10000
        }

    );
}
function createResolvedIcon(){
  return L.divIcon({
    html: '<div style="font-size:32px;line-height:32px;text-shadow:0 2px 6px rgba(0,0,0,.45)">⭐</div>',
    className: "",
    iconSize: [34, 34],
    iconAnchor: [17, 17],
    popupAnchor: [0, -14]
  });
}

function createOpenIcon(){
  return L.divIcon({
    html: '<div style="font-size:32px;line-height:32px;text-shadow:0 2px 6px rgba(0,0,0,.45)">📍</div>',
    className: "",
    iconSize: [34, 34],
    iconAnchor: [17, 34],
    popupAnchor: [0, -30]
  });
}

async function loadReportsFromFirestore(){
  if (!exploreMap) return;

  exploreMarkers.forEach(markerItem => {
    exploreMap.removeLayer(markerItem);
  });

  exploreMarkers = [];

  let openCount = 0;
  let resolvedCount = 0;

  try {
    const q = query(collection(db, "segnalazioni"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    snapshot.forEach(docSnap => {
      const data = docSnap.data();

      if (!data.lat || !data.lng) return;

      const reportId = docSnap.id;
      reportsCache[reportId] = {
    lat: data.lat,
    lng: data.lng
};
      const status = data.stato || "aperta";
      const isResolved = status === "risolta";

      if (isResolved) {
        resolvedCount++;
      } else {
        openCount++;
      }

      const dateText = formatDate(data.createdAt);
      const resolvedDateText = formatDate(data.resolvedAt);

      const markerItem = L.marker(
        [data.lat, data.lng],
        { icon: isResolved ? createResolvedIcon() : createOpenIcon() }
      ).addTo(exploreMap);

      const popupHtml = `
        <div class="popup-box">
          <strong>${escapeHtml(data.categoria || "Segnalazione")}</strong><br>

          ${isResolved
            ? `<span class="resolved-label">⭐ Risolta</span><br>`
            : `<span class="open-label">📍 Aperta</span><br>`
          }

          Conferme: ${Number(data.conferme || 0)}<br>
          Data segnalazione: ${dateText}<br>

          ${data.immagineBase64
            ? `<strong>Foto iniziale</strong><br><img class="popup-img" src="${data.immagineBase64}" alt="Foto segnalazione">`
            : ""
          }

          ${isResolved
            ? `<br><strong>Data risoluzione:</strong> ${resolvedDateText}<br>`
            : ""
          }

          ${data.resolvedImageBase64
            ? `<strong>Foto risoluzione</strong><br><img class="popup-img" src="${data.resolvedImageBase64}" alt="Foto risoluzione">`
            : ""
          }

          <br>

         ${!isResolved && data.ownerId !== ownerId && !(data.confirmedBy || []).includes(ownerId)
  ? `<button class="primary" onclick="window.confirmReport('${reportId}')">Conferma segnalazione</button>`
  : ""
}

${!isResolved
  ? `<button class="resolve" onclick="window.startResolveReport('${reportId}')">⭐ Risolto</button>`
  : ""
}

${data.ownerId === ownerId
  ? `<button class="danger" onclick="window.deleteReport('${reportId}')">Elimina segnalazione</button>`
  : ""
}
        </div>
      `;

      markerItem.bindPopup(popupHtml);
      exploreMarkers.push(markerItem);
    });

    statsBox.innerHTML = `
🔴 Attive: <strong>${openCount}</strong><br>
⭐ Risolte: <strong>${resolvedCount}</strong>
`;

  } catch (error) {
    console.error("Errore caricamento mappa:", error);
    alert("Errore nel caricamento delle segnalazioni.");
  }
}

window.startResolveReport = function(reportId){

    const report = reportsCache[reportId];

    if(!report){
        alert("Errore: dati segnalazione non trovati.");
        return;
    }

    if(!navigator.geolocation){
        alert("GPS non disponibile.");
        return;
    }

    alert("Verifica posizione GPS...");

    navigator.geolocation.getCurrentPosition(

        function(position){

            const distanza = calculateDistanceMeters(
                position.coords.latitude,
                position.coords.longitude,
                report.lat,
                report.lng
            );

            if(distanza > MAX_RESOLVE_DISTANCE_METERS){

                alert("Devi trovarti entro 30 metri dalla segnalazione.\n\nDistanza attuale: " + Math.round(distanza) + " m");

                return;
            }

            reportToResolveId = reportId;

            alert("Posizione verificata. Scatta la foto della risoluzione.");

            resolveCamera.click();

        },

        function(){

            alert("Impossibile rilevare la posizione GPS.");

        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }

    );

};

window.deleteReport = async function(reportId){
  const conferma = confirm("Vuoi eliminare questa segnalazione?");
  if (!conferma) return;

  try {
    await deleteDoc(doc(db, "segnalazioni", reportId));
    alert("Segnalazione eliminata.");
    await loadReportsFromFirestore();

  } catch (error) {
    console.error("Errore eliminazione:", error);
    alert("Errore eliminazione. Controlla le regole Firestore.");
  }
};

window.confirmReport = async function(reportId){
  try {
    await updateDoc(doc(db,"segnalazioni",reportId), {
      conferme: increment(1),
      confirmedBy: arrayUnion(ownerId)
    });

    alert("Segnalazione confermata.");
    await loadReportsFromFirestore();

  } catch(error) {
    console.error(error);
    alert("Errore durante la conferma.");
  }
};

backHomeBtn.onclick = () => {
  showScreen(startScreen);
};

newReportBtn.onclick = () => {
  resetReport();
  showScreen(startScreen);
};

function resetReport(){
  camera.value = "";
  resolveCamera.value = "";
  selectedPhoto = null;
  compressedPhoto = null;
  selectedCategory = null;
  currentLat = null;
  currentLng = null;
  reportToResolveId = null;

  categoryButtons.forEach(btn => btn.classList.remove("selected"));
  aiSuggestion.textContent = "Categoria suggerita: in attesa...";
}

function compressImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = event => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement("canvas");
        const maxWidth = 800;
        const scale = maxWidth / img.width;

        canvas.width = maxWidth;
        canvas.height = img.height * scale;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const base64 = canvas.toDataURL("image/jpeg", 0.55);
        resolve(base64);
      };

      img.onerror = reject;
      img.src = event.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function calculateDistanceMeters(lat1, lng1, lat2, lng2){
    const R = 6371000;

    const radLat1 = lat1 * Math.PI / 180;
    const radLat2 = lat2 * Math.PI / 180;
    const deltaLat = (lat2 - lat1) * Math.PI / 180;
    const deltaLng = (lng2 - lng1) * Math.PI / 180;

    const a =
        Math.sin(deltaLat / 2) * Math.sin(deltaLat / 2) +
        Math.cos(radLat1) * Math.cos(radLat2) *
        Math.sin(deltaLng / 2) * Math.sin(deltaLng / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c;
}
function formatDate(timestamp){
  if (!timestamp || !timestamp.toDate) {
    return "non disponibile";
  }

  const date = timestamp.toDate();

  return date.toLocaleString("it-IT", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
