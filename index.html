<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Territorio Live</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07140d;
      color: white;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 20px;
    }

    .active { display: block; }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .logo {
      width: 180px;
      margin-bottom: 20px;
    }

    .planet {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 6px solid #1cff72;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, #0d4022, #07140d 70%);
      box-shadow: 0 0 35px #1cff72;
      margin: 20px auto;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 15px 22px;
      margin: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: #1cff72;
      color: #07140d;
    }

    .secondary {
      background: transparent;
      color: #1cff72;
      border: 2px solid #1cff72;
    }

    .danger {
      background: #ff5252;
      color: white;
    }

    .card {
      background: #102216;
      border: 1px solid #1cff72;
      border-radius: 18px;
      padding: 16px;
      margin: 14px 0;
    }

    img.preview {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 16px;
      border: 2px solid #1cff72;
    }

    select, textarea, input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
    }

    textarea { min-height: 90px; }

    #map, #confirmMap {
      width: 100%;
      height: 420px;
      border-radius: 18px;
      margin-top: 14px;
    }

    .small {
      font-size: 14px;
      opacity: 0.8;
    }

    .report-img {
      width: 100%;
      border-radius: 12px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <section id="homeScreen" class="screen active">
    <div class="center">
      <img src="logo-tl.png.png" class="logo" alt="Territorio Live" />

      <div class="planet">
        <button onclick="startCamera()">SCATTA</button>
      </div>

      <button class="secondary" onclick="openMap()">APRI LA MAPPA</button>

      <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
    </div>
  </section>

  <section id="previewScreen" class="screen">
    <h2>Anteprima segnalazione</h2>

    <div class="card">
      <img id="photoPreview" class="preview" />
      <p id="gpsStatus" class="small">Recupero posizione GPS...</p>
    </div>

    <div id="confirmMap"></div>

    <button onclick="goToCategory()">CONFERMA POSIZIONE</button>
    <button class="secondary" onclick="goHome()">ANNULLA</button>
  </section>

  <section id="categoryScreen" class="screen">
    <h2>Categoria segnalazione</h2>

    <div class="card">
      <p class="small">Suggerimento AI simulato:</p>
      <h3 id="aiSuggestion">Analisi immagine...</h3>
    </div>

    <select id="categorySelect">
      <option value="">Seleziona categoria</option>
      <option>Discarica abusiva</option>
      <option>Materiali pericolosi</option>
      <option>Veicolo abbandonato o sospetto</option>
      <option>Buca pericolosa</option>
      <option>Lampione spento / illuminazione guasta</option>
      <option>Albero o ramo pericolante</option>
      <option>Segnaletica danneggiata</option>
      <option>Arredo urbano danneggiato</option>
      <option>Altro</option>
    </select>

    <textarea id="noteInput" placeholder="Aggiungi una breve descrizione facoltativa"></textarea>

    <button onclick="sendReport()">INVIA SEGNALAZIONE</button>
    <button class="secondary" onclick="goHome()">ANNULLA</button>
  </section>

  <section id="mapScreen" class="screen">
    <h2>Mappa Territorio Live</h2>
    <button class="secondary" onclick="goHome()">TORNA ALLA HOME</button>
    <div id="map"></div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAhAJOjQSXmzvo2QnuhB4EIDTK88DCHgm0",
      authDomain: "territorio-live.firebaseapp.com",
      projectId: "territorio-live",
      storageBucket: "territorio-live.firebasestorage.app",
      messagingSenderId: "1014933311241",
      appId: "1:1014933311241:web:21cd7b52882677ede58dd8",
      measurementId: "G-96WJ75QWLW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let compressedImage = "";
    let currentLat = null;
    let currentLng = null;
    let confirmMap = null;
    let mainMap = null;
    let mainMarkers = [];

    const screens = {
      home: document.getElementById("homeScreen"),
      preview: document.getElementById("previewScreen"),
      category: document.getElementById("categoryScreen"),
      map: document.getElementById("mapScreen")
    };

    const cameraInput = document.getElementById("cameraInput");
    const photoPreview = document.getElementById("photoPreview");
    const gpsStatus = document.getElementById("gpsStatus");
    const categorySelect = document.getElementById("categorySelect");
    const noteInput = document.getElementById("noteInput");
    const aiSuggestion = document.getElementById("aiSuggestion");

    window.startCamera = function () {
      cameraInput.click();
    };

    cameraInput.addEventListener("change", async function () {
      const file = cameraInput.files[0];
      if (!file) return;

      compressedImage = await compressImage(file);
      photoPreview.src = compressedImage;

      showScreen("preview");
      getGpsPosition();
      simulateAI();
    });

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[name].classList.add("active");
    }

    window.goHome = function () {
      showScreen("home");
      resetForm();
    };

    function resetForm() {
      cameraInput.value = "";
      categorySelect.value = "";
      noteInput.value = "";
      gpsStatus.textContent = "Recupero posizione GPS...";
    }

    function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();

        reader.onload = function (event) {
          const img = new Image();

          img.onload = function () {
            const canvas = document.createElement("canvas");
            const maxWidth = 800;
            const scale = maxWidth / img.width;

            canvas.width = maxWidth;
            canvas.height = img.height * scale;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const base64 = canvas.toDataURL("image/jpeg", 0.55);
            resolve(base64);
          };

          img.src = event.target.result;
        };

        reader.readAsDataURL(file);
      });
    }

    function getGpsPosition() {
      if (!navigator.geolocation) {
        gpsStatus.textContent = "GPS non disponibile su questo dispositivo.";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        position => {
          currentLat = position.coords.latitude;
          currentLng = position.coords.longitude;

          gpsStatus.textContent = `Posizione trovata: ${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;
          loadConfirmMap();
        },
        () => {
          gpsStatus.textContent = "Impossibile recuperare la posizione. Attiva il GPS.";
        },
        {
          enableHighAccuracy: true,
          timeout: 12000,
          maximumAge: 0
        }
      );
    }

    function loadConfirmMap() {
      setTimeout(() => {
        if (confirmMap) {
          confirmMap.remove();
        }

        confirmMap = L.map("confirmMap").setView([currentLat, currentLng], 17);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap"
        }).addTo(confirmMap);

        L.marker([currentLat, currentLng]).addTo(confirmMap)
          .bindPopup("Posizione segnalazione")
          .openPopup();
      }, 200);
    }

    window.goToCategory = function () {
      if (!currentLat || !currentLng) {
        alert("Posizione GPS non ancora disponibile.");
        return;
      }

      showScreen("category");
    };

    function simulateAI() {
      const suggestions = [
        "Possibile rifiuto abbandonato",
        "Possibile arredo urbano danneggiato",
        "Possibile problema stradale",
        "Possibile segnalazione ambientale"
      ];

      aiSuggestion.textContent = suggestions[Math.floor(Math.random() * suggestions.length)];
    }

    window.sendReport = async function () {
      const category = categorySelect.value;

      if (!compressedImage) {
        alert("Manca la foto.");
        return;
      }

      if (!currentLat || !currentLng) {
        alert("Manca la posizione GPS.");
        return;
      }

      if (!category) {
        alert("Seleziona una categoria.");
        return;
      }

      try {
        await addDoc(collection(db, "segnalazioni"), {
          categoria: category,
          descrizione: noteInput.value.trim(),
          immagineBase64: compressedImage,
          lat: currentLat,
          lng: currentLng,
          stato: "aperta",
          conferme: 0,
          dataCreazione: serverTimestamp()
        });

        alert("Segnalazione inviata.");
        goHome();

      } catch (error) {
        console.error(error);
        alert("Errore durante l'invio. Controlla le regole Firestore.");
      }
    };

    window.openMap = async function () {
      showScreen("map");

      setTimeout(async () => {
        if (!mainMap) {
          mainMap = L.map("map").setView([41.1171, 16.8719], 13);

          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap"
          }).addTo(mainMap);
        }

        mainMap.invalidateSize();
        await loadReports();
      }, 200);
    };

    async function loadReports() {
      mainMarkers.forEach(marker => marker.remove());
      mainMarkers = [];

      const q = query(collection(db, "segnalazioni"), orderBy("dataCreazione", "desc"));
      const snapshot = await getDocs(q);

      snapshot.forEach(docSnap => {
        const data = docSnap.data();

        if (!data.lat || !data.lng) return;

        const marker = L.marker([data.lat, data.lng]).addTo(mainMap);

        marker.bindPopup(`
          <strong>${data.categoria || "Segnalazione"}</strong><br>
          Stato: ${data.stato || "aperta"}<br>
          Conferme: ${data.conferme || 0}<br>
          ${data.descrizione ? `<p>${escapeHtml(data.descrizione)}</p>` : ""}
          ${data.immagineBase64 ? `<img src="${data.immagineBase64}" class="report-img">` : ""}
        `);

        mainMarkers.push(marker);
      });
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>

</body>
</html>
