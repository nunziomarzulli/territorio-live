<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territorio Live</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f5f5f5;
  height:100vh;
}

.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

.active{
  display:flex;
}

#cameraBtn{
  width:220px;
  height:220px;
  border-radius:50%;
  border:none;
  background:#2e7d32;
  color:white;
  font-size:28px;
}

input{
  display:none;
}

#previewImg{
  max-width:100%;
  max-height:65vh;
  border-radius:16px;
}

.buttons{
  margin-top:25px;
  display:flex;
  gap:15px;
  justify-content:center;
}

button{
  border:none;
  padding:14px 22px;
  border-radius:12px;
  font-size:18px;
}

.secondary{
  background:#ddd;
  color:#222;
}

.primary{
  background:#2e7d32;
  color:white;
}

#mapScreen{
  padding:0;
  flex-direction:column;
}

#map{
  width:100%;
  height:62vh;
}

#mapPanel{
  width:100%;
  background:white;
  padding:14px;
  box-sizing:border-box;
}

#mapPanel h2{
  margin:0 0 10px 0;
  font-size:22px;
}

#confirmPositionBtn,
#cancelMapBtn{
  width:90%;
  margin-top:10px;
}

#loadingText{
  font-size:22px;
}
</style>
</head>

<body>

<section id="startScreen" class="screen active">
  <div>
    <input type="file" accept="image/*" capture="environment" id="camera">
    <button id="cameraBtn">📷<br><br>SCATTA</button>
    <p>Tocca il pulsante per iniziare</p>
  </div>
</section>

<section id="previewScreen" class="screen">
  <div>
    <img id="previewImg" alt="Anteprima foto">
    <div class="buttons">
      <button class="secondary" id="retakeBtn">Rifai</button>
      <button class="primary" id="continueBtn">Continua</button>
    </div>
  </div>
</section>

<section id="loadingScreen" class="screen">
  <p id="loadingText">📍 Rilevamento posizione...</p>
</section>

<section id="mapScreen" class="screen">
  <div id="map"></div>

  <div id="mapPanel">
    <h2>Conferma posizione</h2>
    <p>Se il punto non è preciso, trascina il pin.</p>

    <button class="primary" id="confirmPositionBtn">
      Conferma posizione
    </button>

    <button class="secondary" id="cancelMapBtn">
      Annulla e rifai foto
    </button>
  </div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const camera = document.getElementById("camera");
const cameraBtn = document.getElementById("cameraBtn");
const startScreen = document.getElementById("startScreen");
const previewScreen = document.getElementById("previewScreen");
const loadingScreen = document.getElementById("loadingScreen");
const mapScreen = document.getElementById("mapScreen");
const previewImg = document.getElementById("previewImg");
const retakeBtn = document.getElementById("retakeBtn");
const continueBtn = document.getElementById("continueBtn");
const confirmPositionBtn = document.getElementById("confirmPositionBtn");
const cancelMapBtn = document.getElementById("cancelMapBtn");

let selectedPhoto = null;
let map = null;
let marker = null;
let currentLat = null;
let currentLng = null;

function showScreen(screen){
  startScreen.classList.remove("active");
  previewScreen.classList.remove("active");
  loadingScreen.classList.remove("active");
  mapScreen.classList.remove("active");
  screen.classList.add("active");
}

cameraBtn.onclick = () => {
  camera.click();
};

camera.onchange = () => {
  const file = camera.files[0];
  if (!file) return;

  selectedPhoto = file;
  previewImg.src = URL.createObjectURL(file);
  showScreen(previewScreen);
};

retakeBtn.onclick = () => {
  camera.value = "";
  selectedPhoto = null;
  showScreen(startScreen);
};

continueBtn.onclick = () => {
  showScreen(loadingScreen);

  if (!navigator.geolocation) {
    alert("GPS non disponibile su questo dispositivo.");
    showScreen(previewScreen);
    return;
  }

  navigator.geolocation.getCurrentPosition(
    position => {
      currentLat = position.coords.latitude;
      currentLng = position.coords.longitude;

      showScreen(mapScreen);

      setTimeout(() => {
        initMap(currentLat, currentLng);
      }, 200);
    },
    error => {
      alert("Non riesco a rilevare la posizione. Controlla i permessi GPS.");
      showScreen(previewScreen);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
};

function initMap(lat, lng){
  if (!map) {
    map = L.map("map").setView([lat, lng], 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    marker = L.marker([lat, lng], {
      draggable: true
    }).addTo(map);

    marker.on("dragend", function(){
      const pos = marker.getLatLng();
      currentLat = pos.lat;
      currentLng = pos.lng;
    });
  } else {
    map.setView([lat, lng], 18);
    marker.setLatLng([lat, lng]);
  }

  setTimeout(() => {
    map.invalidateSize();
  }, 300);
}

confirmPositionBtn.onclick = () => {
  alert("Posizione confermata:\nLat: " + currentLat + "\nLng: " + currentLng);
};

cancelMapBtn.onclick = () => {
  camera.value = "";
  selectedPhoto = null;
  showScreen(startScreen);
};
</script>

</body>
</html>
