<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territorio Live - Login Admin</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:340px;
    background:#1d1d1d;
    border-radius:16px;
    padding:30px;
    box-sizing:border-box;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    margin-top:0;
    color:#39d353;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    margin-top:18px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#39d353;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2db54a;
}

#error{
    color:#ff7070;
    text-align:center;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="box">

<h1>Admin</h1>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">
Accedi
</button>

<div id="error"></div>

</div>

</body>
</html>
