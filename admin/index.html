<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Territorio Live - Login Admin</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #111;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .box {
            width: 100%;
            max-width: 340px;
            padding: 30px;
            border-radius: 16px;
            background: #1d1d1d;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0;
            color: #39d353;
            text-align: center;
        }

        .subtitle {
            margin: 22px 0 20px;
            color: #bcbcbc;
            text-align: center;
        }

        input {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #fff;
            color: #111;
            font-size: 16px;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: 0;
            border-radius: 8px;
            background: #39d353;
            color: #111;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        #error {
            min-height: 20px;
            margin-top: 15px;
            color: #ff7070;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Territorio Live</h1>

        <div class="subtitle">Accesso gestore</div>

        <form id="loginForm">
            <input
                id="email"
                type="email"
                placeholder="Email"
                autocomplete="username"
                required
            >

            <input
                id="password"
                type="password"
                placeholder="Password"
                autocomplete="current-password"
                required
            >

            <button id="loginBtn" type="submit">
                Accedi
            </button>
        </form>

        <div id="error"></div>
    </div>

    <script type="module">
        import { initializeApp } from
        "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

        import {
            getAuth,
            onAuthStateChanged,
            signInWithEmailAndPassword
        } from
        "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhAJOjQSXmzvo2QnuHb4EIDTK88DCHgm0",
            authDomain: "territorio-live.firebaseapp.com",
            projectId: "territorio-live",
            storageBucket: "territorio-live.firebasestorage.app",
            messagingSenderId: "1014933311241",
            appId: "1:1014933311241:web:21cd7b52882677ede58dd8",
            measurementId: "G-96WJ75QWLW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById("loginForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const errorBox = document.getElementById("error");

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.replace("./dashboard.html");
            }
        });

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            errorBox.textContent = "";
            loginBtn.disabled = true;
            loginBtn.textContent = "Accesso in corso...";

            try {
                await signInWithEmailAndPassword(
                    auth,
                    emailInput.value.trim(),
                    passwordInput.value
                );

                window.location.replace("./dashboard.html");

            } catch (error) {
                console.error("Errore Firebase:", error.code, error.message);

                switch (error.code) {
                    case "auth/invalid-credential":
                    case "auth/user-not-found":
                    case "auth/wrong-password":
                        errorBox.textContent =
                            "Email o password non corretti.";
                        break;

                    case "auth/too-many-requests":
                        errorBox.textContent =
                            "Troppi tentativi. Riprova più tardi.";
                        break;

                    case "auth/unauthorized-domain":
                        errorBox.textContent =
                            "Dominio non autorizzato in Firebase.";
                        break;

                    case "auth/api-key-not-valid.-please-pass-a-valid-api-key.":
                        errorBox.textContent =
                            "Chiave Firebase non valida.";
                        break;

                    default:
                        errorBox.textContent =
                            "Accesso non riuscito. Controlla la Console.";
                }

                loginBtn.disabled = false;
                loginBtn.textContent = "Accedi";
            }
        });
    </script>

</body>
</html>
