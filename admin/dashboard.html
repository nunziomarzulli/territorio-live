<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Gestore - Territorio Live</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  background:#111;
  color:white;
}

body{
  overflow:hidden;
}

#loading{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  z-index:5000;
  font-size:18px;
}

#dashboard{
  display:none;
  width:100%;
  height:100%;
}

header{
  height:68px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:10px 16px;
  background:#1d1d1d;
  border-bottom:1px solid #333;
}

.brand{
  min-width:0;
}

.brand h1{
  margin:0;
  color:#39d353;
  font-size:22px;
}

.brand p{
  margin:3px 0 0;
  color:#aaa;
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.header-actions{
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}

#refreshBtn,
#logoutBtn{
  border:none;
  border-radius:9px;
  padding:10px 15px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  white-space:nowrap;
}

#refreshBtn{
  background:#2e7d32;
}

#refreshBtn:disabled,
#logoutBtn:disabled{
  opacity:.7;
  cursor:not-allowed;
}

#logoutBtn{
  background:#c62828;
}

#toolbar{
  min-height:104px;
  display:grid;
  grid-template-columns:repeat(4,minmax(160px,1fr)) auto;
  gap:10px;
  align-items:end;
  padding:12px 16px;
  background:#181818;
  border-bottom:1px solid #333;
}

.filter-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.filter-group label{
  color:#aaa;
  font-size:12px;
  font-weight:bold;
}

.filter-group select{
  width:100%;
  padding:10px;
  border:1px solid #444;
  border-radius:9px;
  background:#2a2a2a;
  color:white;
  font-size:14px;
}

#resetFiltersBtn{
  border:none;
  border-radius:9px;
  padding:11px 15px;
  background:#444;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#mapWrap{
  position:relative;
  width:100%;
  height:calc(100% - 172px);
}

#adminMap{
  width:100%;
  height:100%;
}

#statsBox{
  position:absolute;
  left:15px;
  bottom:18px;
  z-index:1000;
  min-width:165px;
  padding:11px 14px;
  border-radius:12px;
  background:rgba(20,20,20,.92);
  color:white;
  box-shadow:0 4px 15px rgba(0,0,0,.35);
  font-size:14px;
  line-height:1.6;
}

.category-marker{
  width:38px;
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#c62828;
  border:3px solid white;
  box-shadow:0 2px 8px rgba(0,0,0,.45);
  font-size:22px;
}

.popup{
  min-width:220px;
  max-width:280px;
  color:#222;
  text-align:left;
}

.popup h3{
  margin:0 0 8px;
  color:#1b5e20;
  font-size:17px;
}

.popup img{
  display:block;
  width:100%;
  max-height:170px;
  object-fit:cover;
  border-radius:9px;
  margin:8px 0;
}

.popup-row{
  margin:5px 0;
  line-height:1.35;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:15px;
  font-size:12px;
  font-weight:bold;
}

.badge-open{
  background:#c62828;
  color:white;
}

.badge-resolved{
  background:#f9a825;
  color:#111;
}

.popup-actions{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}

.popup-actions a,
.popup-actions button{
  display:block;
  width:100%;
  border:none;
  border-radius:8px;
  padding:10px;
  text-align:center;
  text-decoration:none;
  font-weight:bold;
  cursor:pointer;
}

.map-link,
.map-link:link,
.map-link:visited,
.map-link:hover,
.map-link:active{
  background:#1565c0;
  color:#ffffff !important;
  text-decoration:none;
}

.delete-btn{
  background:#c62828;
  color:white;
}

.empty-overlay{
  position:absolute;
  inset:0;
  z-index:900;
  display:none;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.empty-overlay div{
  background:rgba(20,20,20,.9);
  color:white;
  border-radius:12px;
  padding:14px 18px;
  box-shadow:0 4px 18px rgba(0,0,0,.35);
}

#moderationAlert{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 16px;
  background:#5b1d1d;
  border-bottom:1px solid #8f2a2a;
  color:#ffd7d7;
}

#moderationAlert.active{
  display:flex;
}

#moderationAlertText{
  font-weight:bold;
}

#moderationAlertActions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

#showModerationBtn,
#showAllReportsBtn{
  border:none;
  border-radius:8px;
  padding:9px 12px;
  font-weight:bold;
  cursor:pointer;
}

#showModerationBtn{
  background:#ffca28;
  color:#111;
}

#showAllReportsBtn{
  display:none;
  background:#e0e0e0;
  color:#222;
}

#showAllReportsBtn.active{
  display:inline-block;
}

.moderation-warning{
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  background:#ffe8e8;
  border:1px solid #d32f2f;
  color:#8b1e1e;
}

.approve-btn{
  background:#2e7d32;
  color:white;
}

.resolution-editor{
  margin-top:10px;
  padding:10px;
  border-radius:9px;
  background:#f1f5f2;
  border:1px solid #cfd8d1;
}
.resolution-editor label{display:block;margin:7px 0 4px;font-size:12px;font-weight:bold}
.resolution-editor select,.resolution-editor input{width:100%;padding:8px;border:1px solid #bbb;border-radius:7px;background:#fff;color:#222}
.save-resolution-btn{margin-top:8px;background:#2e7d32;color:#fff}

@media(max-width:900px){
  #toolbar{
    grid-template-columns:repeat(2,minmax(130px,1fr));
    min-height:176px;
  }

  #mapWrap{
    height:calc(100% - 244px);
  }

  #resetFiltersBtn{
    width:100%;
  }
}

@media(max-width:560px){
  header{
    height:74px;
  }

  .brand h1{
    font-size:18px;
  }

  #toolbar{
    grid-template-columns:1fr 1fr;
    padding:10px;
    gap:8px;
  }

  .filter-group select{
    font-size:12px;
    padding:9px 7px;
  }

  #mapWrap{
    height:calc(100% - 250px);
  }

  #statsBox{
    left:8px;
    bottom:8px;
    font-size:12px;
    min-width:145px;
  }

  .header-actions{
    gap:6px;
  }

  #refreshBtn,
  #logoutBtn{
    padding:9px 10px;
    font-size:12px;
  }
}

/* Visualizzatore foto a schermo intero */
.popup img{
  cursor:zoom-in;
}

#imageViewer{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(0,0,0,.92);
  z-index:10000;
}

#imageViewer.active{
  display:flex;
}

#imageViewerContent{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
}

#imageViewerImage{
  display:block;
  max-width:96vw;
  max-height:92vh;
  width:auto;
  height:auto;
  object-fit:contain;
  border-radius:10px;
  box-shadow:0 8px 35px rgba(0,0,0,.55);
}

#imageViewerClose{
  position:absolute;
  top:8px;
  right:8px;
  width:46px;
  height:46px;
  padding:0;
  border:2px solid rgba(255,255,255,.8);
  border-radius:50%;
  background:rgba(0,0,0,.65);
  color:white;
  font-size:30px;
  line-height:40px;
  cursor:pointer;
  z-index:2;
}

#imageViewerCaption{
  position:absolute;
  left:50%;
  bottom:8px;
  transform:translateX(-50%);
  max-width:90%;
  padding:8px 12px;
  border-radius:9px;
  background:rgba(0,0,0,.65);
  color:white;
  font-size:14px;
  text-align:center;
}

body.image-viewer-open{
  overflow:hidden;
}

@media(max-width:560px){
  #imageViewer{
    padding:12px;
  }

  #imageViewerImage{
    max-width:100%;
    max-height:88vh;
    border-radius:7px;
  }

  #imageViewerClose{
    top:4px;
    right:4px;
  }

  #imageViewerCaption{
    bottom:4px;
    font-size:12px;
  }
}


/* Gestione Comuni */
#municipalitiesBtn{
  border:none;
  border-radius:9px;
  padding:10px 15px;
  background:#1565c0;
  color:white;
  font-weight:bold;
  cursor:pointer;
  white-space:nowrap;
}

#municipalitiesBtn:disabled{
  opacity:.7;
  cursor:not-allowed;
}

#municipalitiesCount{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:24px;
  height:24px;
  margin-left:7px;
  padding:0 7px;
  border-radius:999px;
  background:#ffffff;
  color:#1565c0;
  font-size:13px;
  font-weight:900;
}

#municipalitiesPanel{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.82);
  z-index:9000;
}

#municipalitiesPanel.active{
  display:flex;
}

.municipalities-card{
  width:min(1050px,100%);
  max-height:92vh;
  overflow:auto;
  border:1px solid #3a3a3a;
  border-radius:16px;
  background:#1d1d1d;
  box-shadow:0 20px 60px rgba(0,0,0,.55);
}

.municipalities-header{
  position:sticky;
  top:0;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:16px 18px;
  background:#1d1d1d;
  border-bottom:1px solid #333;
}

.municipalities-header h2{
  margin:0;
  color:#39d353;
  font-size:21px;
}

#closeMunicipalitiesBtn{
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:#333;
  color:white;
  font-size:26px;
  cursor:pointer;
}

.municipalities-content{
  padding:18px;
}

#municipalityForm{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:13px;
  padding:16px;
  border:1px solid #333;
  border-radius:13px;
  background:#181818;
}

.municipality-field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.municipality-field.full{
  grid-column:1 / -1;
}

.municipality-field label{
  color:#bbb;
  font-size:12px;
  font-weight:bold;
}

.municipality-field input,
.municipality-field select{
  width:100%;
  padding:11px;
  border:1px solid #444;
  border-radius:9px;
  outline:none;
  background:#2a2a2a;
  color:white;
  font-size:14px;
}

.municipality-field input:focus,
.municipality-field select:focus{
  border-color:#39d353;
  box-shadow:0 0 0 3px rgba(57,211,83,.14);
}

.municipality-form-actions{
  grid-column:1 / -1;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  flex-wrap:wrap;
}

#saveMunicipalityBtn,
#resetMunicipalityFormBtn{
  border:none;
  border-radius:9px;
  padding:11px 16px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#saveMunicipalityBtn{background:#2e7d32}
#resetMunicipalityFormBtn{background:#555}

#municipalityMessage{
  min-height:22px;
  margin:13px 0;
  padding:0;
  border-radius:8px;
  text-align:center;
  font-size:14px;
}

#municipalityMessage.success{
  padding:10px;
  background:rgba(57,211,83,.12);
  color:#75e887;
}

#municipalityMessage.error{
  padding:10px;
  background:rgba(255,85,85,.12);
  color:#ff8585;
}

.municipalities-list-title{
  margin:22px 0 10px;
  font-size:18px;
}

#municipalitiesList{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.municipality-item{
  display:grid;
  grid-template-columns:minmax(150px,1.2fr) minmax(170px,1.3fr) minmax(110px,.7fr) auto;
  gap:12px;
  align-items:center;
  padding:13px;
  border:1px solid #333;
  border-radius:11px;
  background:#242424;
}

.municipality-name{
  font-weight:bold;
  color:white;
}

.municipality-meta{
  margin-top:4px;
  color:#aaa;
  font-size:12px;
  line-height:1.4;
}

.municipality-status{
  display:inline-block;
  padding:5px 9px;
  border-radius:15px;
  font-size:12px;
  font-weight:bold;
  text-align:center;
}

.status-in_attesa{background:#6d4c00;color:#ffe082}
.status-attivo{background:#1b5e20;color:#a5d6a7}
.status-disattivato{background:#6d1b1b;color:#ffcdd2}

.municipality-actions{
  display:flex;
  gap:7px;
  justify-content:flex-end;
  flex-wrap:wrap;
}

.municipality-actions button{
  border:none;
  border-radius:8px;
  padding:8px 10px;
  color:white;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
}

.edit-municipality-btn{background:#1565c0}
.activate-municipality-btn{background:#2e7d32}
.disable-municipality-btn{background:#ef6c00}
.delete-municipality-btn{background:#c62828}

@media(max-width:760px){
  #municipalityForm{grid-template-columns:1fr}
  .municipality-field.full{grid-column:auto}
  .municipality-form-actions{grid-column:auto}
  .municipality-item{grid-template-columns:1fr}
  .municipality-actions{justify-content:flex-start}
}

</style>
</head>

<body>

<div id="loading">Verifica accesso...</div>

<div id="dashboard">

  <header>
    <div class="brand">
      <h1>Territorio Live — Gestore</h1>
      <p id="adminEmail"></p>
    </div>

    <div class="header-actions">
      <button id="municipalitiesBtn" type="button">
        🏛️ Gestione Comuni
        <span id="municipalitiesCount" aria-label="Comuni registrati">0</span>
      </button>

      <button id="refreshBtn" type="button">
        ↻ Aggiorna segnalazioni
      </button>

      <button id="logoutBtn" type="button">Esci</button>
    </div>
  </header>

  <div id="toolbar">

    <div class="filter-group">
      <label for="provinceFilter">Provincia</label>
      <select id="provinceFilter">
        <option value="Tutte">Tutte</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="municipalityFilter">Comune</label>
      <select id="municipalityFilter">
        <option value="Tutti">Tutti</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="categoryFilter">Problematica</label>
      <select id="categoryFilter">
        <option value="Tutte">Tutte</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="statusFilter">Stato</label>
      <select id="statusFilter">
        <option value="Tutte">Tutte</option>
        <option value="Aperte">Aperte</option>
        <option value="Risolte">Risolte</option>
      </select>
    </div>

    <button id="resetFiltersBtn" type="button">
      Azzera filtri
    </button>

  </div>

  <div id="moderationAlert" role="status" aria-live="polite">
    <div id="moderationAlertText">
      Nessuna segnalazione sospetta.
    </div>

    <div id="moderationAlertActions">
      <button id="showModerationBtn" type="button">
        Visualizza sospette
      </button>

      <button id="showAllReportsBtn" type="button">
        Mostra tutte
      </button>
    </div>
  </div>

  <div id="mapWrap">
    <div id="adminMap"></div>

    <div id="emptyOverlay" class="empty-overlay">
      <div>Nessuna segnalazione con questi filtri.</div>
    </div>

    <div id="statsBox">
      Caricamento...
    </div>

  </div>

</div>



<div id="municipalitiesPanel" aria-hidden="true">
  <section class="municipalities-card" role="dialog" aria-modal="true" aria-labelledby="municipalitiesTitle">
    <div class="municipalities-header">
      <h2 id="municipalitiesTitle">Gestione Comuni ed Enti</h2>
      <button id="closeMunicipalitiesBtn" type="button" aria-label="Chiudi">×</button>
    </div>

    <div class="municipalities-content">
      <form id="municipalityForm">
        <input id="municipalityDocumentId" type="hidden">

        <div class="municipality-field">
          <label for="municipalityName">Comune / Ente *</label>
          <input id="municipalityName" type="text" required placeholder="Es. Adelfia">
        </div>

        <div class="municipality-field">
          <label for="municipalityProvince">Provincia *</label>
          <input id="municipalityProvince" type="text" required placeholder="Es. Bari">
        </div>

        <div class="municipality-field">
          <label for="municipalityEmail">Email istituzionale *</label>
          <input id="municipalityEmail" type="email" required placeholder="protocollo@comune.it">
        </div>

        <div class="municipality-field">
          <label for="municipalityPhone">Telefono</label>
          <input id="municipalityPhone" type="text" placeholder="Numero di contatto">
        </div>

        <div class="municipality-field">
          <label for="municipalityContact">Referente *</label>
          <input id="municipalityContact" type="text" required placeholder="Nome e cognome">
        </div>

        <div class="municipality-field">
          <label for="municipalityContactRole">Ruolo del referente</label>
          <input id="municipalityContactRole" type="text" placeholder="Es. Sindaco, assessore, funzionario">
        </div>

        <div class="municipality-field full">
          <label for="municipalityUid">UID Firebase (lascia vuoto finché l’account non è stato creato)</label>
          <input id="municipalityUid" type="text" placeholder="UID utente Firebase">
        </div>

        <div class="municipality-field">
          <label for="municipalityStatus">Stato</label>
          <select id="municipalityStatus">
            <option value="in_attesa">In attesa</option>
            <option value="attivo">Attivo</option>
            <option value="disattivato">Disattivato</option>
          </select>
        </div>

        <div class="municipality-field">
          <label for="municipalityPlan">Piano</label>
          <select id="municipalityPlan">
            <option value="prova">Prova gratuita</option>
            <option value="abbonamento">Abbonamento</option>
            <option value="nessuno">Nessuno</option>
          </select>
        </div>

        <div class="municipality-form-actions">
          <button id="resetMunicipalityFormBtn" type="button">Pulisci</button>
          <button id="saveMunicipalityBtn" type="submit">Salva Comune</button>
        </div>
      </form>

      <div id="municipalityMessage" aria-live="polite"></div>

      <h3 class="municipalities-list-title">Comuni registrati</h3>
      <div id="municipalitiesList">Caricamento...</div>
    </div>
  </section>
</div>

<div
  id="imageViewer"
  role="dialog"
  aria-modal="true"
  aria-hidden="true"
  aria-label="Anteprima foto ingrandita">

  <div id="imageViewerContent">
    <button
      id="imageViewerClose"
      type="button"
      aria-label="Chiudi foto">
      ×
    </button>

    <img
      id="imageViewerImage"
      src=""
      alt="Foto ingrandita">

    <div id="imageViewerCaption"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

function openImageViewer(imageSource, caption){
  if(!imageSource){
    return;
  }

  imageViewerImage.src = imageSource;
  imageViewerImage.alt = caption || "Foto ingrandita";
  imageViewerCaption.textContent = caption || "";
  imageViewer.classList.add("active");
  imageViewer.setAttribute("aria-hidden","false");
  document.body.classList.add("image-viewer-open");

  if(!imageViewerHistoryActive){
    history.pushState(
      {
        territorioLiveImageViewer:true
      },
      "",
      window.location.href
    );

    imageViewerHistoryActive = true;
  }

  imageViewerClose.focus();
}

function closeImageViewer(useBrowserHistory = true){
  if(!imageViewer.classList.contains("active")){
    return;
  }

  imageViewer.classList.remove("active");
  imageViewer.setAttribute("aria-hidden","true");
  imageViewerImage.src = "";
  imageViewerCaption.textContent = "";
  document.body.classList.remove("image-viewer-open");

  if(useBrowserHistory && imageViewerHistoryActive){
    imageViewerHistoryActive = false;
    history.back();
  }else{
    imageViewerHistoryActive = false;
  }
}

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatDate(timestamp){
  if(!timestamp){
    return "-";
  }

  try{
    const date =
      typeof timestamp.toDate === "function"
        ? timestamp.toDate()
        : new Date(timestamp);

    if(Number.isNaN(date.getTime())){
      return "-";
    }

    return date.toLocaleString("it-IT",{
      day:"2-digit",
      month:"2-digit",
      year:"numeric",
      hour:"2-digit",
      minute:"2-digit"
    });
  }catch(error){
    return "-";
  }
}

function timestampToDate(timestamp){
  if(!timestamp){
    return null;
  }

  try{
    const date =
      typeof timestamp.toDate === "function"
        ? timestamp.toDate()
        : new Date(timestamp);

    return Number.isNaN(date.getTime()) ? null : date;
  }catch(error){
    return null;
  }
}

function getResolutionTimestamp(report){
  return (
    report.resolvedAt ||
    report.risoltaAt ||
    report.dataRisoluzione ||
    report.resolvedDate ||
    report.updatedAt ||
    null
  );
}

function isResolvedWithinLastDays(report, days){
  const resolutionDate = timestampToDate(getResolutionTimestamp(report));

  if(!resolutionDate){
    return false;
  }

  const elapsedMilliseconds = Date.now() - resolutionDate.getTime();
  const maximumMilliseconds = days * 24 * 60 * 60 * 1000;

  return elapsedMilliseconds >= 0 && elapsedMilliseconds <= maximumMilliseconds;
}

function getResolutionDurationText(report){
  const createdDate = timestampToDate(report.createdAt);
  const resolutionDate = timestampToDate(getResolutionTimestamp(report));

  if(!createdDate || !resolutionDate){
    return "-";
  }

  const elapsedMilliseconds = resolutionDate.getTime() - createdDate.getTime();

  if(elapsedMilliseconds < 0){
    return "-";
  }

  const totalHours = Math.round(elapsedMilliseconds / (60 * 60 * 1000));

  if(totalHours < 24){
    return totalHours === 1 ? "1 ora" : `${totalHours} ore`;
  }

  const totalDays = Math.round(totalHours / 24);
  return totalDays === 1 ? "1 giorno" : `${totalDays} giorni`;
}

function uniqueSorted(values){
  return [...new Set(
    values
      .map(value => String(value || "").trim())
      .filter(Boolean)
  )].sort((a,b) => a.localeCompare(b,"it"));
}

function setSelectOptions(selectElement, firstValue, firstLabel, values){
  const previousValue = selectElement.value;

  selectElement.innerHTML =
    `<option value="${escapeHtml(firstValue)}">${escapeHtml(firstLabel)}</option>` +
    values
      .map(value =>
        `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`
      )
      .join("");

  selectElement.value =
    [...selectElement.options].some(option => option.value === previousValue)
      ? previousValue
      : firstValue;
}

function rebuildFilters(){
  const provinces = uniqueSorted(
    reports.map(report => report.provincia)
  );

  setSelectOptions(
    provinceFilter,
    "Tutte",
    "Tutte",
    provinces
  );

  const selectedProvince = provinceFilter.value;

  const municipalitySource = reports.filter(report => {
    if(selectedProvince === "Tutte"){
      return true;
    }

    return String(report.provincia || "").trim() === selectedProvince;
  });

  const municipalities = uniqueSorted(
    municipalitySource.map(report => report.comune)
  );

  setSelectOptions(
    municipalityFilter,
    "Tutti",
    "Tutti",
    municipalities
  );

  const categories = uniqueSorted(
    reports.map(report => report.categoria)
  );

  setSelectOptions(
    categoryFilter,
    "Tutte",
    "Tutte",
    categories
  );
}

function getFilteredReports(){
  const selectedProvince = provinceFilter.value;
  const selectedMunicipality = municipalityFilter.value;
  const selectedCategory = categoryFilter.value;
  const selectedStatus = statusFilter.value;

  return reports.filter(report => {
    const status = String(report.stato || "aperta").toLowerCase();
    const isResolved = status === "risolta" || status === "risolto";
    const isPendingModeration =
      String(report.moderazioneStato || "") === "da_controllare";

    if(moderationOnly && !isPendingModeration){
      return false;
    }

    if(
      selectedProvince !== "Tutte" &&
      String(report.provincia || "").trim() !== selectedProvince
    ){
      return false;
    }

    if(
      selectedMunicipality !== "Tutti" &&
      String(report.comune || "").trim() !== selectedMunicipality
    ){
      return false;
    }

    if(
      selectedCategory !== "Tutte" &&
      String(report.categoria || "").trim() !== selectedCategory
    ){
      return false;
    }

    if(selectedStatus === "Aperte"){
      return !isResolved;
    }

    if(selectedStatus === "Risolte"){
      return isResolved;
    }

    if(selectedStatus === "Tutte" && isResolved){
      return isResolvedWithinLastDays(report,7);
    }

    return true;
  });
}

function updateModerationAlert(){
  const pendingCount = reports.filter(report =>
    String(report.moderazioneStato || "") === "da_controllare"
  ).length;

  if(pendingCount > 0){
    moderationAlert.classList.add("active");
    moderationAlertText.textContent =
      pendingCount === 1
        ? "⚠️ 1 segnalazione sospetta da controllare"
        : `⚠️ ${pendingCount} segnalazioni sospette da controllare`;

    showModerationBtn.style.display =
      moderationOnly ? "none" : "inline-block";

    showAllReportsBtn.classList.toggle(
      "active",
      moderationOnly
    );
  }else{
    moderationAlert.classList.remove("active");
    moderationAlertText.textContent =
      "Nessuna segnalazione sospetta.";
    moderationOnly = false;
    showAllReportsBtn.classList.remove("active");
  }
}

function renderMap(){
  updateModerationAlert();

  if(markerClusterGroup){
    markerClusterGroup.clearLayers();
  }

  mapMarkers = [];

  const filteredReports = getFilteredReports();
  const bounds = [];

  let openCount = 0;
  let resolvedCount = 0;

  filteredReports.forEach(report => {
    const lat = Number(report.lat);
    const lng = Number(report.lng);

    if(!Number.isFinite(lat) || !Number.isFinite(lng)){
      return;
    }

    const status = String(report.stato || "aperta").toLowerCase();
    const isResolved = status === "risolta" || status === "risolto";

    if(isResolved){
      resolvedCount++;
    }else{
      openCount++;
    }

    const marker = L.marker(
      [lat,lng],
      {
        icon:isResolved
          ? createResolvedIcon()
          : createOpenIcon(report.categoria)
      }
    );

    marker.bindPopup(
      createPopupHtml(report),
      {
        maxWidth:300
      }
    );

    markerClusterGroup.addLayer(marker);
    mapMarkers.push(marker);
    bounds.push([lat,lng]);
  });

  emptyOverlay.style.display =
    mapMarkers.length === 0
      ? "flex"
      : "none";

  statsBox.innerHTML = `
    <strong>📍 Segnalazioni visualizzate: ${mapMarkers.length}</strong><br>
    🔴 Aperte: ${openCount}<br>
    ⭐ Risolte: ${resolvedCount}
    ${moderationOnly
      ? "<br>⚠️ Modalità moderazione"
      : ""
    }
  `;

  if(bounds.length === 1){
    adminMap.setView(bounds[0],16);
  }else if(bounds.length > 1){
    adminMap.fitBounds(bounds,{
      padding:[35,35],
      maxZoom:16
    });
  }
}

async function loadReports(){
  refreshBtn.disabled = true;
  refreshBtn.textContent = "⏳ Aggiornamento...";
  statsBox.textContent = "Caricamento...";

  try{
    const reportsQuery = query(
      collection(db,"segnalazioni"),
      orderBy("createdAt","desc")
    );

    const snapshot = await getDocs(reportsQuery);

    reports = snapshot.docs
      .map(docSnapshot => ({
        id:docSnapshot.id,
        ...docSnapshot.data()
      }))
      .filter(report => report.eliminataDaAdmin !== true);

    rebuildFilters();
    renderMap();

  }catch(error){
    console.error("Errore caricamento:",error);
    statsBox.innerHTML = "Errore nel caricamento.";
    alert("Errore nel caricamento delle segnalazioni.");
  }

  refreshBtn.disabled = false;
  refreshBtn.textContent = "↻ Aggiorna segnalazioni";
}


window.saveResolutionExecutor = async function(reportId){
  const typeElement = document.getElementById(`executorType-${reportId}`);
  const nameElement = document.getElementById(`executorName-${reportId}`);
  if(!typeElement || !nameElement) return;

  let name = nameElement.value.trim();
  const type = typeElement.value;
  const report = reports.find(item => item.id === reportId);

  if(type === "non_noto") name = "Non noto";
  if(type === "comune" && !name) name = report?.comune ? `Comune di ${report.comune}` : "Comune";
  if(!name){
    alert("Inserisci il nome del soggetto oppure seleziona Non noto.");
    return;
  }

  try{
    await updateDoc(doc(db,"segnalazioni",reportId),{
      interventoEseguitoDa:name,
      interventoEseguitoDaTipo:type,
      interventoEseguitoDaAggiornatoAt:new Date().toISOString(),
      interventoEseguitoDaAggiornatoDa:auth.currentUser?.email || "admin",
      risoltoDa:name
    });
    await loadReports();
    alert("Attribuzione della risoluzione aggiornata.");
  }catch(error){
    console.error("Errore aggiornamento attribuzione:",error);
    alert("Aggiornamento non riuscito.");
  }
};

window.approveAdminReport = async function(reportId){
  const confirmed = confirm(
    "Confermi che la foto è valida?\n\n" +
    "La segnalazione resterà pubblicata e verrà rimossa dalla coda di controllo."
  );

  if(!confirmed){
    return;
  }

  try{
    await updateDoc(
      doc(db,"segnalazioni",reportId),
      {
        moderazioneStato:"approvata",
        moderazioneMotivo:"",
        spamScore:0
      }
    );

    await loadReports();

  }catch(error){
    console.error("Errore approvazione:",error);
    alert("Approvazione non riuscita.");
  }
};

window.deleteAdminReport = async function(reportId){
  const report = reports.find(item => item.id === reportId);

  if(!report){
    alert("Segnalazione non trovata.");
    return;
  }

  const status = String(report.stato || "aperta").toLowerCase();
  const isResolved = status === "risolta" || status === "risolto";

  const confirmed = confirm(
    isResolved
      ? "Vuoi rimuovere questa segnalazione risolta dalla mappa pubblica e dalla Dashboard Gestore?\n\n" +
        "Resterà nello storico del Comune, che potrà conservarla, esportarla in Excel oppure rimuoverla dal proprio archivio."
      : "Vuoi eliminare definitivamente questa segnalazione aperta?\n\n" +
        "L'operazione non può essere annullata."
  );

  if(!confirmed){
    return;
  }

  try{
    if(isResolved){
      await updateDoc(
        doc(db,"segnalazioni",reportId),
        {
          eliminataDaAdmin:true,
          eliminataDaAdminAt:serverTimestamp(),
          eliminataDaAdminUid:auth.currentUser?.uid || "",
          visibilePubblico:false,
          visibileAdmin:false
        }
      );
    }else{
      await deleteDoc(
        doc(db,"segnalazioni",reportId)
      );
    }

    await loadReports();

  }catch(error){
    console.error("Errore eliminazione:",error);
    alert("Eliminazione non riuscita.");
  }
};


function municipalitySlug(value){
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-+|-+$/g,"");
}

function openMunicipalitiesPanel(){
  municipalitiesPanel.classList.add("active");
  municipalitiesPanel.setAttribute("aria-hidden","false");
  document.body.style.overflow = "hidden";
  loadMunicipalities();
}

function closeMunicipalitiesPanel(){
  municipalitiesPanel.classList.remove("active");
  municipalitiesPanel.setAttribute("aria-hidden","true");
  document.body.style.overflow = "hidden";
}

function formatMunicipalityDate(value){
  if(!value) return "-";
  try{
    const date = typeof value.toDate === "function" ? value.toDate() : new Date(value);
    if(Number.isNaN(date.getTime())) return "-";
    return date.toLocaleDateString("it-IT");
  }catch(error){
    return "-";
  }
}

function renderMunicipalities(){
  municipalitiesCount.textContent = String(municipalities.length);
  municipalitiesCount.setAttribute(
    "aria-label",
    municipalities.length === 1
      ? "1 Comune registrato"
      : `${municipalities.length} Comuni registrati`
  );

  if(municipalities.length === 0){
    municipalitiesList.innerHTML = "<div style=\"color:#aaa\">Nessun Comune registrato.</div>";
    return;
  }

  municipalitiesList.innerHTML = municipalities.map(item => {
    const status = String(item.stato || "in_attesa");
    const trialEnd = item.dataFineProva ? formatMunicipalityDate(item.dataFineProva) : "-";
    return `
      <div class="municipality-item">
        <div>
          <div class="municipality-name">${escapeHtml(item.comune || item.id)}</div>
          <div class="municipality-meta">Provincia: ${escapeHtml(item.provincia || "-")}<br>Referente: ${escapeHtml(item.referente || "-")}</div>
        </div>
        <div>
          <div>${escapeHtml(item.email || "-")}</div>
          <div class="municipality-meta">UID: ${escapeHtml(item.uid || "non assegnato")}<br>Fine prova: ${escapeHtml(trialEnd)}</div>
        </div>
        <div>
          <span class="municipality-status status-${escapeHtml(status)}">${escapeHtml(status.replaceAll("_"," "))}</span>
          <div class="municipality-meta">Piano: ${escapeHtml(item.piano || "-")}</div>
        </div>
        <div class="municipality-actions">
          <button class="edit-municipality-btn" type="button" data-action="edit" data-id="${escapeHtml(item.id)}">Modifica</button>
          ${status !== "attivo" ? `<button class="activate-municipality-btn" type="button" data-action="activate" data-id="${escapeHtml(item.id)}">Attiva 90 gg</button>` : `<button class="disable-municipality-btn" type="button" data-action="disable" data-id="${escapeHtml(item.id)}">Disattiva</button>`}
          <button class="delete-municipality-btn" type="button" data-action="delete" data-id="${escapeHtml(item.id)}">Elimina</button>
        </div>
      </div>
    `;
  }).join("");
}

async function loadMunicipalities(){
  municipalitiesList.textContent = "Caricamento...";
  try{
    const snapshot = await getDocs(collection(db,"utentiComuni"));
    municipalities = snapshot.docs.map(item => ({id:item.id,...item.data()}));
    municipalities.sort((a,b) => String(a.comune || a.id).localeCompare(String(b.comune || b.id),"it"));
    renderMunicipalities();
  }catch(error){
    console.error("Errore caricamento Comuni:",error);
    municipalities = [];
    municipalitiesCount.textContent = "!";
    municipalitiesCount.setAttribute("aria-label","Errore nel conteggio dei Comuni");
    municipalitiesList.textContent = "Impossibile caricare i Comuni.";
  }
}

function editMunicipality(id){
  const item = municipalities.find(entry => entry.id === id);
  if(!item) return;
  municipalityDocumentId.value = item.id;
  municipalityName.value = item.comune || "";
  municipalityProvince.value = item.provincia || "";
  municipalityEmail.value = item.email || "";
  municipalityPhone.value = item.telefono || "";
  municipalityContact.value = item.referente || "";
  municipalityContactRole.value = item.ruoloReferente || "";
  municipalityUid.value = item.uid || "";
  municipalityStatus.value = item.stato || "in_attesa";
  municipalityPlan.value = item.piano || "prova";
  saveMunicipalityBtn.textContent = "Aggiorna Comune";
  clearMunicipalityMessage();
  municipalityName.focus();
}

async function activateMunicipality(id){
  const item = municipalities.find(entry => entry.id === id);
  if(!item) return;
  if(!String(item.uid || "").trim()){
    alert("Prima inserisci l’UID Firebase del Comune.");
    editMunicipality(id);
    return;
  }
  const endDate = new Date();
  endDate.setDate(endDate.getDate() + 90);
  try{
    await updateDoc(doc(db,"utentiComuni",id),{
      stato:"attivo",
      piano:"prova",
      dataAttivazione:serverTimestamp(),
      dataFineProva:endDate,
      aggiornatoAt:serverTimestamp(),
      aggiornatoDa:auth.currentUser?.email || "admin"
    });
    await loadMunicipalities();
  }catch(error){
    console.error("Errore attivazione Comune:",error);
    alert("Attivazione non riuscita. Controlla le regole Firestore.");
  }
}

async function disableMunicipality(id){
  if(!confirm("Vuoi disattivare l’accesso di questo Comune?")) return;
  try{
    await updateDoc(doc(db,"utentiComuni",id),{
      stato:"disattivato",
      aggiornatoAt:serverTimestamp(),
      aggiornatoDa:auth.currentUser?.email || "admin"
    });
    await loadMunicipalities();
  }catch(error){
    console.error("Errore disattivazione Comune:",error);
    alert("Disattivazione non riuscita.");
  }
}

async function deleteMunicipality(id){
  if(!confirm("Vuoi eliminare definitivamente questo Comune da Firestore?\n\nL’utente Firebase Authentication non verrà eliminato automaticamente.")) return;
  try{
    await deleteDoc(doc(db,"utentiComuni",id));
    await loadMunicipalities();
    resetMunicipalityForm();
  }catch(error){
    console.error("Errore eliminazione Comune:",error);
    alert("Eliminazione non riuscita.");
  }
}

function initMap(){
  if(adminMap){
    return;
  }

  adminMap = L.map("adminMap").setView(
    [41.1171,16.8719],
    10
  );

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      maxZoom:19,
      attribution:"© OpenStreetMap"
    }
  ).addTo(adminMap);

  markerClusterGroup = L.markerClusterGroup({
    showCoverageOnHover:false,
    spiderfyOnMaxZoom:true,
    removeOutsideVisibleBounds:true,
    animate:true,
    maxClusterRadius:55,
    disableClusteringAtZoom:17,

    iconCreateFunction(cluster){
      const childCount = cluster.getChildCount();

      let backgroundColor = "#ffc107";
      let clusterSize = 42;

      if(childCount >= 20 && childCount < 100){
        backgroundColor = "#d32f2f";
        clusterSize = 48;
      }else if(childCount >= 100){
        backgroundColor = "#7b1fa2";
        clusterSize = 56;
      }

      return L.divIcon({
        html:`
          <div style="
            width:${clusterSize}px;
            height:${clusterSize}px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:50%;
            background:${backgroundColor};
            border:3px solid rgba(255,255,255,.92);
            box-shadow:
              0 0 0 6px ${backgroundColor}55,
              0 3px 10px rgba(0,0,0,.4);
            color:${backgroundColor === "#ffc107" ? "#111" : "#fff"};
            font-size:${childCount >= 100 ? "16px" : "14px"};
            font-weight:bold;
          ">
            ${childCount}
          </div>
        `,
        className:"",
        iconSize:[clusterSize,clusterSize],
        iconAnchor:[clusterSize / 2,clusterSize / 2]
      });
    }
  });

  adminMap.addLayer(markerClusterGroup);
}

provinceFilter.addEventListener("change",() => {
  const selectedProvince = provinceFilter.value;

  const municipalitySource = reports.filter(report => {
    if(selectedProvince === "Tutte"){
      return true;
    }

    return String(report.provincia || "").trim() === selectedProvince;
  });

  const municipalities = uniqueSorted(
    municipalitySource.map(report => report.comune)
  );

  setSelectOptions(
    municipalityFilter,
    "Tutti",
    "Tutti",
    municipalities
  );

  renderMap();
});

municipalityFilter.addEventListener("change",renderMap);
categoryFilter.addEventListener("change",renderMap);
statusFilter.addEventListener("change",renderMap);

showModerationBtn.addEventListener("click",() => {
  moderationOnly = true;
  renderMap();
});

showAllReportsBtn.addEventListener("click",() => {
  moderationOnly = false;
  renderMap();
});

resetFiltersBtn.addEventListener("click",() => {
  provinceFilter.value = "Tutte";

  const municipalities = uniqueSorted(
    reports.map(report => report.comune)
  );

  setSelectOptions(
    municipalityFilter,
    "Tutti",
    "Tutti",
    municipalities
  );

  municipalityFilter.value = "Tutti";
  categoryFilter.value = "Tutte";
  statusFilter.value = "Tutte";
  moderationOnly = false;

  renderMap();
});


municipalitiesBtn.addEventListener("click",openMunicipalitiesPanel);
closeMunicipalitiesBtn.addEventListener("click",closeMunicipalitiesPanel);
resetMunicipalityFormBtn.addEventListener("click",resetMunicipalityForm);

municipalitiesPanel.addEventListener("click",event => {
  if(event.target === municipalitiesPanel){
    closeMunicipalitiesPanel();
  }
});

document.addEventListener("keydown",event => {
  if(event.key === "Escape" && municipalitiesPanel.classList.contains("active")){
    closeMunicipalitiesPanel();
  }
});

municipalityForm.addEventListener("submit",async event => {
  event.preventDefault();
  clearMunicipalityMessage();

  const existingId = municipalityDocumentId.value.trim();
  const generatedId = municipalitySlug(municipalityName.value);
  const documentId = existingId || generatedId;

  if(!documentId){
    showMunicipalityMessage("Inserisci il nome del Comune.","error");
    return;
  }

  saveMunicipalityBtn.disabled = true;
  saveMunicipalityBtn.textContent = "Salvataggio...";

  const previous = municipalities.find(item => item.id === documentId) || {};

  const data = {
    comune:municipalityName.value.trim(),
    provincia:municipalityProvince.value.trim(),
    email:municipalityEmail.value.trim().toLowerCase(),
    telefono:municipalityPhone.value.trim(),
    referente:municipalityContact.value.trim(),
    ruoloReferente:municipalityContactRole.value.trim(),
    uid:municipalityUid.value.trim(),
    ruolo:"comune",
    stato:municipalityStatus.value,
    piano:municipalityPlan.value,
    dataRichiesta:previous.dataRichiesta || serverTimestamp(),
    dataAttivazione:previous.dataAttivazione || null,
    dataFineProva:previous.dataFineProva || null,
    creatoDa:previous.creatoDa || auth.currentUser?.email || "admin",
    aggiornatoAt:serverTimestamp(),
    aggiornatoDa:auth.currentUser?.email || "admin"
  };

  try{
    await setDoc(doc(db,"utentiComuni",documentId),data,{merge:true});
    showMunicipalityMessage(existingId ? "Comune aggiornato." : "Comune creato correttamente.","success");
    await loadMunicipalities();
    if(!existingId){
      resetMunicipalityForm();
      showMunicipalityMessage("Comune creato correttamente.","success");
    }
  }catch(error){
    console.error("Errore salvataggio Comune:",error);
    showMunicipalityMessage("Salvataggio non riuscito. Controlla le regole Firestore.","error");
  }finally{
    saveMunicipalityBtn.disabled = false;
    saveMunicipalityBtn.textContent = municipalityDocumentId.value ? "Aggiorna Comune" : "Salva Comune";
  }
});

municipalitiesList.addEventListener("click",event => {
  const button = event.target.closest("button[data-action]");
  if(!button) return;
  const id = button.dataset.id;
  const action = button.dataset.action;
  if(action === "edit") editMunicipality(id);
  if(action === "activate") activateMunicipality(id);
  if(action === "disable") disableMunicipality(id);
  if(action === "delete") deleteMunicipality(id);
});

refreshBtn.addEventListener("click",loadReports);

logoutBtn.addEventListener("click",async () => {
  logoutBtn.disabled = true;
  logoutBtn.textContent = "Uscita...";

  try{
    await signOut(auth);
    window.location.replace("./index.html");
  }catch(error){
    logoutBtn.disabled = false;
    logoutBtn.textContent = "Esci";
    alert("Logout non riuscito.");
  }
});

onAuthStateChanged(auth,user => {
  if(!user){
    window.location.replace("./index.html");
    return;
  }

  adminEmail.textContent =
    "Account: " + (user.email || "Amministratore");

  loading.style.display = "none";
  dashboard.style.display = "block";

  initMap();

  setTimeout(() => {
    adminMap.invalidateSize();
    loadReports();
    loadMunicipalities();
  },150);
});

</script>
