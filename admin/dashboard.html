<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  font-family:Arial,Helvetica,sans-serif;
  background:#111;
  color:white;
}

body{
  overflow:hidden;
}

#loading{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  z-index:5000;

}

#dashboard{
  display:none;
  width:100%;

}

header{
  height:68px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;

  background:#1d1d1d;

.brand{

.brand h1{

.brand p{

.header-actions{

  gap:10px;

#refreshBtn,
#logoutBtn{

}

#refreshBtn{

}

#refreshBtn:disabled,
#logoutBtn:disabled{

}

#logoutBtn{

#toolbar{
  min-height:104px;

}

.filter-group{

.filter-group label{

.filter-group select{

  color:white;

}

#resetFiltersBtn{

  border-radius:9px;
  padding:11px 15px;
  background:#444;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#mapWrap{

  width:100%;

}

#adminMap{

}

#statsBox{

.category-marker{

.popup{

.popup h3{

}

.popup img{

.popup-row{

.badge{

.badge-open{

}

.badge-resolved{

.popup-actions{

.popup-actions a,

.map-link,

}

.delete-btn{

}

.empty-overlay{

#moderationAlert{

#moderationAlertActions{

<script type="module">

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loading = document.getElementById("loading");
const dashboard = document.getElementById("dashboard");

const provinceFilter = document.getElementById("provinceFilter");
const municipalityFilter = document.getElementById("municipalityFilter");

const resetFiltersBtn = document.getElementById("resetFiltersBtn");

const emptyOverlay = document.getElementById("emptyOverlay");

const moderationAlertText = document.getElementById("moderationAlertText");
const showModerationBtn = document.getElementById("showModerationBtn");
const showAllReportsBtn = document.getElementById("showAllReportsBtn");

const imageViewer = document.getElementById("imageViewer");
const imageViewerImage = document.getElementById("imageViewerImage");
const imageViewerClose = document.getElementById("imageViewerClose");
const imageViewerCaption = document.getElementById("imageViewerCaption");

let imageViewerHistoryActive = false;


let adminMap = null;
let markerClusterGroup = null;
let mapMarkers = [];
let reports = [];
let moderationOnly = false;


function openImageViewer(imageSource, caption){
  if(!imageSource){
    return;
  }

  imageViewerImage.src = imageSource;
  imageViewerImage.alt = caption || "Foto ingrandita";
  imageViewerCaption.textContent = caption || "";
  imageViewer.classList.add("active");
  imageViewer.setAttribute("aria-hidden","false");
  document.body.classList.add("image-viewer-open");

  if(!imageViewerHistoryActive){
    history.pushState(
      {
        territorioLiveImageViewer:true
      },
      "",
      window.location.href
    );

    imageViewerHistoryActive = true;
  }

  imageViewerClose.focus();
}

function closeImageViewer(useBrowserHistory = true){
  if(!imageViewer.classList.contains("active")){
    return;
  }

  imageViewer.classList.remove("active");
  imageViewer.setAttribute("aria-hidden","true");
  imageViewerImage.src = "";
  imageViewerCaption.textContent = "";
  document.body.classList.remove("image-viewer-open");

  if(useBrowserHistory && imageViewerHistoryActive){
    imageViewerHistoryActive = false;
    history.back();
  }else{
    imageViewerHistoryActive = false;
  }
}

document.addEventListener("click",event => {
  const clickedImage = event.target.closest(".zoomable-report-image");

  if(clickedImage){
    event.preventDefault();
    event.stopPropagation();

    openImageViewer(
      clickedImage.src,
      clickedImage.dataset.caption ||
      clickedImage.alt ||
      "Foto segnalazione"
    );

    return;
  }

  if(
    imageViewer.classList.contains("active") &&
    (
      event.target === imageViewer ||
      event.target === imageViewerContent
    )
  ){
    closeImageViewer();
  }
});

imageViewerClose.addEventListener("click",() => {
  closeImageViewer();
});

document.addEventListener("keydown",event => {
  if(
    event.key === "Escape" &&
    imageViewer.classList.contains("active")
  ){
    closeImageViewer();
  }
});

window.addEventListener("popstate",() => {
  if(imageViewer.classList.contains("active")){
    closeImageViewer(false);
  }
});

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatDate(timestamp){
  if(!timestamp){
    return "-";
  }

  try{
    const date =
      typeof timestamp.toDate === "function"
        ? timestamp.toDate()
        : new Date(timestamp);

    if(Number.isNaN(date.getTime())){
      return "-";
    }

    return date.toLocaleString("it-IT",{
      day:"2-digit",
      month:"2-digit",
      year:"numeric",
      hour:"2-digit",
      minute:"2-digit"
    });
  }catch(error){
    return "-";
  }
}

function timestampToDate(timestamp){
  if(!timestamp){
    return null;
  }

  try{
    const date =
      typeof timestamp.toDate === "function"
        ? timestamp.toDate()
        : new Date(timestamp);

    return Number.isNaN(date.getTime()) ? null : date;
  }catch(error){
    return null;
  }
}

function getResolutionTimestamp(report){
  return (
    report.resolvedAt ||
    report.risoltaAt ||
    report.dataRisoluzione ||
    report.resolvedDate ||
    report.updatedAt ||
    null
  );
}

function isResolvedWithinLastDays(report, days){
  const resolutionDate = timestampToDate(getResolutionTimestamp(report));

  if(!resolutionDate){
    return false;
  }

  const elapsedMilliseconds = Date.now() - resolutionDate.getTime();
  const maximumMilliseconds = days * 24 * 60 * 60 * 1000;

  return elapsedMilliseconds >= 0 && elapsedMilliseconds <= maximumMilliseconds;
}

function getResolutionDurationText(report){
  const createdDate = timestampToDate(report.createdAt);
  const resolutionDate = timestampToDate(getResolutionTimestamp(report));

  if(!createdDate || !resolutionDate){
    return "-";
  }

  const elapsedMilliseconds = resolutionDate.getTime() - createdDate.getTime();

  if(elapsedMilliseconds < 0){
    return "-";
  }

  const totalHours = Math.round(elapsedMilliseconds / (60 * 60 * 1000));

  if(totalHours < 24){
    return totalHours === 1 ? "1 ora" : `${totalHours} ore`;
  }

  const totalDays = Math.round(totalHours / 24);
  return totalDays === 1 ? "1 giorno" : `${totalDays} giorni`;
}

function getCategoryEmoji(category){
  const icons = {
    "Buca stradale":"🕳️",
    "Rifiuti / Discarica abusiva":"🚮",
    "Veicolo abbandonato":"🚗",
    "Illuminazione pubblica guasta":"💡",
    "Segnaletica danneggiata":"🚧",
    "Materiali pericolosi":"☣️",
    "Perdita d'acqua":"💧",
    "Arredo urbano danneggiato":"🧱",
    "Discarica a cielo aperto":"🏚️",
    "Sversamento sospetto":"💧",
    "Albero o ramo pericolante":"🌳",
    "Incendio":"🔥"
  };

  return icons[category] || "📍";
}

function getCategoryColor(category){
  const colors = {
    "Buca stradale":"#ffc107",
    "Rifiuti / Discarica abusiva":"#d32f2f",
    "Veicolo abbandonato":"#616161",
    "Illuminazione pubblica guasta":"#ffeb3b",
    "Segnaletica danneggiata":"#f57c00",
    "Materiali pericolosi":"#7b1fa2",
    "Perdita d'acqua":"#1976d2",
    "Arredo urbano danneggiato":"#795548"
  };

  return colors[category] || "#c62828";
}

}

function createResolvedIcon(){
  return L.divIcon({
    html:'<div style="font-size:32px;line-height:32px;text-shadow:0 2px 6px rgba(0,0,0,.45)">⭐</div>',
    className:"",

    iconAnchor:[17,17],
    popupAnchor:[0,-14]
  });
}

function uniqueSorted(values){
  return [...new Set(
    values
      .map(value => String(value || "").trim())
      .filter(Boolean)
  )].sort((a,b) => a.localeCompare(b,"it"));
}

function setSelectOptions(selectElement, firstValue, firstLabel, values){
  const previousValue = selectElement.value;

  selectElement.innerHTML =
    `<option value="${escapeHtml(firstValue)}">${escapeHtml(firstLabel)}</option>` +
    values
      .map(value =>
        `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`
      )
      .join("");

  selectElement.value =
    [...selectElement.options].some(option => option.value === previousValue)
      ? previousValue
      : firstValue;
}

function rebuildFilters(){
  const provinces = uniqueSorted(
    reports.map(report => report.provincia)
  );

  setSelectOptions(
    provinceFilter,
    "Tutte",
    "Tutte",
    provinces
  );

  const selectedProvince = provinceFilter.value;

  const municipalitySource = reports.filter(report => {
    if(selectedProvince === "Tutte"){
      return true;
    }

    return String(report.provincia || "").trim() === selectedProvince;
  });

  const municipalities = uniqueSorted(
    municipalitySource.map(report => report.comune)
  );

  setSelectOptions(
    municipalityFilter,
    "Tutti",
    "Tutti",
    municipalities
  );

  const categories = uniqueSorted(
    reports.map(report => report.categoria)
  );

  setSelectOptions(
    categoryFilter,
    "Tutte",
    "Tutte",
    categories
  );
}

function getFilteredReports(){
  const selectedProvince = provinceFilter.value;
  const selectedMunicipality = municipalityFilter.value;
  const selectedCategory = categoryFilter.value;
  const selectedStatus = statusFilter.value;

  return reports.filter(report => {
    const status = String(report.stato || "aperta").toLowerCase();
    const isResolved = status === "risolta" || status === "risolto";
    const isPendingModeration =
      String(report.moderazioneStato || "") === "da_controllare";

    if(moderationOnly && !isPendingModeration){
      return false;
    }

    if(
      selectedProvince !== "Tutte" &&
      String(report.provincia || "").trim() !== selectedProvince
    ){
      return false;
    }

    if(
      selectedMunicipality !== "Tutti" &&
      String(report.comune || "").trim() !== selectedMunicipality
    ){
      return false;
    }

    if(
      selectedCategory !== "Tutte" &&
      String(report.categoria || "").trim() !== selectedCategory
    ){
      return false;
    }

    if(selectedStatus === "Aperte"){
      return !isResolved;
    }

    if(selectedStatus === "Risolte"){
      return isResolved;
    }

    if(selectedStatus === "Tutte" && isResolved){
      return isResolvedWithinLastDays(report,7);
    }

    return true;
  });
}

function createPopupHtml(report){
  const status = String(report.stato || "aperta").toLowerCase();
  const isResolved = status === "risolta" || status === "risolto";

  const initialImage =
    typeof report.immagineBase64 === "string"
      ? report.immagineBase64.trim()
      : "";

  const resolvedImage =
    typeof report.resolvedImageBase64 === "string"
      ? report.resolvedImageBase64.trim()
      : "";

  return `
    <div class="popup">
      <h3>${escapeHtml(report.categoria || "Segnalazione")}</h3>

      <div class="popup-row">
        <span class="badge ${isResolved ? "badge-resolved" : "badge-open"}">
          ${isResolved ? "⭐ Risolta" : "📍 Aperta"}
        </span>
      </div>

      <div class="popup-row">
        <strong>Comune:</strong>
        ${escapeHtml(report.comune || "-")}
      </div>

      <div class="popup-row">
        <strong>Provincia:</strong>
        ${escapeHtml(report.provincia || "-")}
      </div>

      <div class="popup-row">
        <strong>Indirizzo:</strong>
        ${escapeHtml(report.indirizzo || "-")}
      </div>

      <div class="popup-row">
        <strong>Segnalata:</strong>
        ${formatDate(report.createdAt)}
      </div>

      ${isResolved
        ? `<div class="popup-row">
             <strong>Risolta:</strong>
             ${formatDate(getResolutionTimestamp(report))}
           </div>

           <div class="popup-row">
             <strong>Tempo di risoluzione:</strong>
             ${escapeHtml(getResolutionDurationText(report))}
           </div>

           <div class="popup-row">
             <strong>Risoluzione segnalata da:</strong>
             ${escapeHtml(report.risoluzioneSegnalataDa || "Non disponibile")}
           </div>

           <div class="popup-row">
             <strong>Intervento eseguito da:</strong>
             ${escapeHtml(report.interventoEseguitoDa || report.risoltoDa || "Non noto")}
           </div>

           <div class="resolution-editor">
             <label for="executorType-${report.id}">Tipo soggetto</label>
             <select id="executorType-${report.id}">
               <option value="non_noto" ${(report.interventoEseguitoDaTipo || "non_noto") === "non_noto" ? "selected" : ""}>Non noto</option>
               <option value="comune" ${report.interventoEseguitoDaTipo === "comune" ? "selected" : ""}>Comune</option>
               <option value="ditta" ${report.interventoEseguitoDaTipo === "ditta" ? "selected" : ""}>Ditta incaricata</option>
               <option value="associazione" ${report.interventoEseguitoDaTipo === "associazione" ? "selected" : ""}>Associazione</option>
               <option value="cittadino" ${report.interventoEseguitoDaTipo === "cittadino" ? "selected" : ""}>Cittadino / privato</option>
               <option value="altro" ${report.interventoEseguitoDaTipo === "altro" ? "selected" : ""}>Altro soggetto</option>
             </select>
             <label for="executorName-${report.id}">Nome visualizzato pubblicamente</label>
             <input id="executorName-${report.id}" type="text" value="${escapeHtml(report.interventoEseguitoDa || report.risoltoDa || "Non noto")}">
             <button class="save-resolution-btn" type="button" onclick="window.saveResolutionExecutor('${report.id}')">Salva attribuzione</button>
           </div>`
        : ""
      }

      <div class="popup-row">
        <strong>Conferme:</strong>
        ${Number(report.conferme || 0)}
      </div>

      ${Number(report.ricorrenze || 0) > 0
        ? `<div class="popup-row">
             <strong>Ricorrenze:</strong>
             ${Number(report.ricorrenze || 0)}
           </div>`
        : ""
      }

      ${Number(report.risoluzioniTotali || 0) > 0
        ? `<div class="popup-row">
             <strong>Risoluzioni totali:</strong>
             ${Number(report.risoluzioniTotali || 0)}
           </div>`
        : ""
      }

      ${initialImage
        ? `<strong>Foto segnalazione</strong>
           <img class="zoomable-report-image" src="${initialImage}" alt="Foto segnalazione" data-caption="Foto segnalazione">`
        : ""
      }

      ${resolvedImage
        ? `<strong>Foto risoluzione</strong>
           <img class="zoomable-report-image" src="${resolvedImage}" alt="Foto risoluzione" data-caption="Foto risoluzione">`
        : ""
      }

      ${String(report.moderazioneStato || "") === "da_controllare"
        ? `<div class="moderation-warning">
             <strong>⚠️ Da controllare</strong><br>
             ${escapeHtml(
               report.moderazioneMotivo ||
               "Motivo non specificato"
             )}
           </div>`
        : ""
      }

      <div class="popup-actions">
        ${String(report.moderazioneStato || "") === "da_controllare"
          ? `<button
               class="approve-btn"
               type="button"
               onclick="window.approveAdminReport('${report.id}')">
               Approva foto
             </button>`
          : ""
        }

        <a
          class="map-link"
          href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(report.lat + "," + report.lng)}"
          target="_blank"
          rel="noopener noreferrer">
          Apri in Google Maps
        </a>

        <button
          class="delete-btn"
          type="button"
          onclick="window.deleteAdminReport('${report.id}')">
          Elimina definitivamente
        </button>

function updateModerationAlert(){
  const pendingCount = reports.filter(report =>
    String(report.moderazioneStato || "") === "da_controllare"
  ).length;

  if(pendingCount > 0){
    moderationAlert.classList.add("active");
    moderationAlertText.textContent =
      pendingCount === 1
        ? "⚠️ 1 segnalazione sospetta da controllare"
        : `⚠️ ${pendingCount} segnalazioni sospette da controllare`;

    showModerationBtn.style.display =
      moderationOnly ? "none" : "inline-block";

    showAllReportsBtn.classList.toggle(
      "active",
      moderationOnly
    );
  }else{
    moderationAlert.classList.remove("active");
    moderationAlertText.textContent =
      "Nessuna segnalazione sospetta.";
    moderationOnly = false;
    showAllReportsBtn.classList.remove("active");
  }
}

function renderMap(){
  updateModerationAlert();

  if(markerClusterGroup){
    markerClusterGroup.clearLayers();
  }

  mapMarkers = [];

  const filteredReports = getFilteredReports();
  const bounds = [];

  let openCount = 0;
  let resolvedCount = 0;

  filteredReports.forEach(report => {
    const lat = Number(report.lat);
    const lng = Number(report.lng);

    if(!Number.isFinite(lat) || !Number.isFinite(lng)){
      return;
    }

    const status = String(report.stato || "aperta").toLowerCase();
    const isResolved = status === "risolta" || status === "risolto";

    if(isResolved){
      resolvedCount++;
    }else{
      openCount++;
    }

    const marker = L.marker(
      [lat,lng],
      {
        icon:isResolved
          ? createResolvedIcon()
          : createOpenIcon(report.categoria)
      }
    );

    marker.bindPopup(
      createPopupHtml(report),
      {
        maxWidth:300
      }
    );

    markerClusterGroup.addLayer(marker);
    mapMarkers.push(marker);
    bounds.push([lat,lng]);
  });

  emptyOverlay.style.display =
    mapMarkers.length === 0
      ? "flex"
      : "none";

  statsBox.innerHTML = `
    <strong>📍 Segnalazioni visualizzate: ${mapMarkers.length}</strong><br>
    🔴 Aperte: ${openCount}<br>
    ⭐ Risolte: ${resolvedCount}
    ${moderationOnly
      ? "<br>⚠️ Modalità moderazione"
      : ""
    }
  `;

  if(bounds.length === 1){
    adminMap.setView(bounds[0],16);
  }else if(bounds.length > 1){
    adminMap.fitBounds(bounds,{
      padding:[35,35],
      maxZoom:16
    });
  }
}

async function loadReports(){
  refreshBtn.disabled = true;
  refreshBtn.textContent = "⏳ Aggiornamento...";
  statsBox.textContent = "Caricamento...";

  try{
    const reportsQuery = query(
      collection(db,"segnalazioni"),
      orderBy("createdAt","desc")
    );

    const snapshot = await getDocs(reportsQuery);

    reports = snapshot.docs.map(docSnapshot => ({
      id:docSnapshot.id,
      ...docSnapshot.data()
    }));

    rebuildFilters();
    renderMap();

  }catch(error){
    console.error("Errore caricamento:",error);
    statsBox.innerHTML = "Errore nel caricamento.";
    alert("Errore nel caricamento delle segnalazioni.");
  }

  refreshBtn.disabled = false;
  refreshBtn.textContent = "↻ Aggiorna segnalazioni";
}


window.saveResolutionExecutor = async function(reportId){
  const typeElement = document.getElementById(`executorType-${reportId}`);
  const nameElement = document.getElementById(`executorName-${reportId}`);
  if(!typeElement || !nameElement) return;

  let name = nameElement.value.trim();
  const type = typeElement.value;
  const report = reports.find(item => item.id === reportId);

  if(type === "non_noto") name = "Non noto";
  if(type === "comune" && !name) name = report?.comune ? `Comune di ${report.comune}` : "Comune";
  if(!name){
    alert("Inserisci il nome del soggetto oppure seleziona Non noto.");
    return;
  }

  try{
    await updateDoc(doc(db,"segnalazioni",reportId),{
      interventoEseguitoDa:name,
      interventoEseguitoDaTipo:type,
      interventoEseguitoDaAggiornatoAt:new Date().toISOString(),
      interventoEseguitoDaAggiornatoDa:auth.currentUser?.email || "admin",
      risoltoDa:name
    });
    await loadReports();
    alert("Attribuzione della risoluzione aggiornata.");
  }catch(error){
    console.error("Errore aggiornamento attribuzione:",error);
    alert("Aggiornamento non riuscito.");
  }
};

window.approveAdminReport = async function(reportId){
  const confirmed = confirm(
    "Confermi che la foto è valida?\n\n" +
    "La segnalazione resterà pubblicata e verrà rimossa dalla coda di controllo."
  );

  if(!confirmed){
    return;
  }

  try{
    await updateDoc(
      doc(db,"segnalazioni",reportId),
      {
        moderazioneStato:"approvata",
        moderazioneMotivo:"",
        spamScore:0
      }
    );

    await loadReports();

  }catch(error){
    console.error("Errore approvazione:",error);
    alert("Approvazione non riuscita.");
  }
};

window.deleteAdminReport = async function(reportId){
  const confirmed = confirm(
    "Vuoi eliminare definitivamente questa segnalazione?\n\n" +
    "L'operazione cancella anche lo storico e non può essere annullata."
  );

  if(!confirmed){
    return;
  }

  try{
    await deleteDoc(
      doc(db,"segnalazioni",reportId)
    );

    await loadReports();

  }catch(error){
    console.error("Errore eliminazione:",error);
    alert("Eliminazione non riuscita.");
  }
};

function initMap(){
  if(adminMap){
    return;
  }

  adminMap = L.map("adminMap").setView(
    [41.1171,16.8719],
    10
  );

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      maxZoom:19,
      attribution:"© OpenStreetMap"
    }
  ).addTo(adminMap);

  markerClusterGroup = L.markerClusterGroup({
    showCoverageOnHover:false,
    spiderfyOnMaxZoom:true,
    removeOutsideVisibleBounds:true,
    animate:true,
    maxClusterRadius:55,
    disableClusteringAtZoom:17,

    iconCreateFunction(cluster){
      const childCount = cluster.getChildCount();

      let backgroundColor = "#ffc107";
      let clusterSize = 42;

      if(childCount >= 20 && childCount < 100){
        backgroundColor = "#d32f2f";
        clusterSize = 48;
      }else if(childCount >= 100){
        backgroundColor = "#7b1fa2";
        clusterSize = 56;
      }

      return L.divIcon({
        html:`
          <div style="
            width:${clusterSize}px;
            height:${clusterSize}px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:50%;
            background:${backgroundColor};
            border:3px solid rgba(255,255,255,.92);
            box-shadow:
              0 0 0 6px ${backgroundColor}55,
              0 3px 10px rgba(0,0,0,.4);
            color:${backgroundColor === "#ffc107" ? "#111" : "#fff"};
            font-size:${childCount >= 100 ? "16px" : "14px"};
            font-weight:bold;
          ">
            ${childCount}
          </div>
        `,
        className:"",
        iconSize:[clusterSize,clusterSize],
        iconAnchor:[clusterSize / 2,clusterSize / 2]
      });
    }
  });

  adminMap.addLayer(markerClusterGroup);
}

provinceFilter.addEventListener("change",() => {
  const selectedProvince = provinceFilter.value;

  const municipalitySource = reports.filter(report => {
    if(selectedProvince === "Tutte"){
      return true;
    }

    return String(report.provincia || "").trim() === selectedProvince;
  });

  const municipalities = uniqueSorted(
    municipalitySource.map(report => report.comune)
  );

  setSelectOptions(
    municipalityFilter,
    "Tutti",
    "Tutti",
    municipalities
  );

  renderMap();
});

municipalityFilter.addEventListener("change",renderMap);
categoryFilter.addEventListener("change",renderMap);
statusFilter.addEventListener("change",renderMap);

showModerationBtn.addEventListener("click",() => {
  moderationOnly = true;
  renderMap();
});

showAllReportsBtn.addEventListener("click",() => {
  moderationOnly = false;
  renderMap();
});

resetFiltersBtn.addEventListener("click",() => {
  provinceFilter.value = "Tutte";

  const municipalities = uniqueSorted(
    reports.map(report => report.comune)
  );

  setSelectOptions(
    municipalityFilter,
    "Tutti",
    "Tutti",
    municipalities
  );

  municipalityFilter.value = "Tutti";
  categoryFilter.value = "Tutte";
  statusFilter.value = "Tutte";
  moderationOnly = false;

  renderMap();
});

refreshBtn.addEventListener("click",loadReports);

logoutBtn.addEventListener("click",async () => {
  logoutBtn.disabled = true;
  logoutBtn.textContent = "Uscita...";

  try{
    await signOut(auth);
    window.location.replace("./index.html");
  }catch(error){
    logoutBtn.disabled = false;
    logoutBtn.textContent = "Esci";
    alert("Logout non riuscito.");
  }
});

onAuthStateChanged(auth,user => {
  if(!user){
    window.location.replace("./index.html");
    return;
  }

  adminEmail.textContent =
    "Account: " + (user.email || "Amministratore");

  loading.style.display = "none";
  dashboard.style.display = "block";

  initMap();

  setTimeout(() => {
    adminMap.invalidateSize();
    loadReports();
  },150);
});

</script>
